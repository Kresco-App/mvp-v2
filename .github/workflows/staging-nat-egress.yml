name: Staging NAT Egress

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Audit routes or provision NAT egress"
        required: true
        default: "audit"
        type: choice
        options:
          - audit
          - provision
      confirm_create_nat:
        description: "Required for provision mode. NAT Gateway creates hourly AWS cost."
        required: true
        default: false
        type: boolean
      nat_public_subnet_id:
        description: "Optional public subnet for NAT Gateway. Leave blank to auto-detect."
        required: false
        default: ""
        type: string

jobs:
  nat-egress:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Audit or provision NAT egress
        run: |
          cd backend
          python scripts/ensure_lambda_nat_egress.py
        env:
          AWS_REGION: eu-west-3
          ZAPPA_STAGE: staging
          KRESCO_RUNTIME_SECRET_ID: ${{ vars.KRESCO_RUNTIME_SECRET_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NAT_EGRESS_MODE: ${{ inputs.mode }}
          CONFIRM_CREATE_NAT: ${{ inputs.confirm_create_nat }}
          NAT_PUBLIC_SUBNET_ID: ${{ inputs.nat_public_subnet_id }}

      - name: Re-run provider diagnostics after provision
        if: ${{ inputs.mode == 'provision' }}
        env:
          BACKEND_READY_URL: ${{ vars.BACKEND_READY_URL }}
          KRESCO_INTERNAL_SECRET: ${{ secrets.REALTIME_OUTBOX_SECRET }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.request

          ready_url = os.environ["BACKEND_READY_URL"].rstrip("/")
          base_url = ready_url[:-len("/ready")] if ready_url.endswith("/ready") else ready_url
          diagnostics_url = f"{base_url}/api/internal/diagnostics?include_provider_reachability=true"
          request = urllib.request.Request(
              diagnostics_url,
              headers={"x-kresco-internal-secret": os.environ["KRESCO_INTERNAL_SECRET"]},
              method="GET",
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.loads(response.read().decode("utf-8"))
          print(json.dumps({
              "status": payload.get("status"),
              "errors": payload.get("errors", []),
              "payment": payload.get("checks", {}).get("payment", {}),
          }, indent=2, sort_keys=True))
          PY
