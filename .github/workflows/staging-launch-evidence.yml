name: Staging Launch Evidence

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    environment: staging
    env:
      PROJECT_ID: kresco-staging
      REGION: europe-southwest1
      BACKEND_SERVICE: kresco-backend-staging
      FRONTEND_SERVICE: kresco-frontend-staging
      CLOUD_SQL_INSTANCE: kresco-staging-postgres
      STAGING_FRONTEND_APEX_URL: https://staging.kresco.ma
      STAGING_API_HOST: api.staging.kresco.ma
      STAGING_PUBLIC_API_URL: https://api.staging.kresco.ma
      EVIDENCE_DIR: artifacts/staging-launch-evidence

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Prepare evidence directory
        run: |
          mkdir -p "$EVIDENCE_DIR"
          printf '%s\n' '{"passed":false,"errors":["staging launch evidence collection did not finish"]}' > "$EVIDENCE_DIR/evidence-manifest.json"

      - name: Collect Cloud Run posture
        continue-on-error: true
        run: |
          set -euo pipefail
          gcloud run services describe "$BACKEND_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format=json > "$EVIDENCE_DIR/backend-cloud-run.json"
          gcloud run services describe "$FRONTEND_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format=json > "$EVIDENCE_DIR/frontend-cloud-run.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          errors = []
          for name in ("backend", "frontend"):
              doc = json.loads((evidence_dir / f"{name}-cloud-run.json").read_text())
              annotations = doc.get("spec", {}).get("template", {}).get("metadata", {}).get("annotations", {})
              if annotations.get("autoscaling.knative.dev/minScale", "0") not in {"0", ""}:
                  errors.append(f"{name} minScale must be 0")
              if annotations.get("autoscaling.knative.dev/maxScale") not in {"3", 3}:
                  errors.append(f"{name} maxScale must be 3")
              if doc.get("status", {}).get("conditions", []) and not any(
                  item.get("type") == "Ready" and item.get("status") == "True"
                  for item in doc["status"]["conditions"]
              ):
                  errors.append(f"{name} Cloud Run service is not Ready")
          if errors:
              raise SystemExit("; ".join(errors))
          PY

      - name: Collect Firebase Hosting rewrites
        continue-on-error: true
        run: |
          set -euo pipefail
          python scripts/check_firebase_hosting_rewrites.py \
            --environment staging \
            --json > "$EVIDENCE_DIR/firebase-hosting-rewrites.json"

      - name: Collect Firebase Hosting domain contract
        continue-on-error: true
        run: |
          set -euo pipefail
          python scripts/check_firebase_hosting_domains.py \
            --environment staging \
            --live \
            --json > "$EVIDENCE_DIR/firebase-hosting-domains.json"

      - name: Collect Firebase Hosting DNS record plan
        continue-on-error: true
        run: |
          set -euo pipefail
          python scripts/export_firebase_hosting_dns_records.py \
            --environment staging \
            --json > "$EVIDENCE_DIR/firebase-hosting-dns-records.json"

      - name: Collect public DNS record evidence
        continue-on-error: true
        run: |
          set +e
          python scripts/check_firebase_hosting_public_dns.py \
            --environment staging \
            --json > "$EVIDENCE_DIR/firebase-hosting-public-dns.json" 2> "$EVIDENCE_DIR/firebase-hosting-public-dns.stderr.txt"
          status=$?
          printf '{"exit_code":%s}\n' "$status" > "$EVIDENCE_DIR/firebase-hosting-public-dns.status.json"
          exit 0

      - name: Collect Cloud SQL cost posture
        continue-on-error: true
        run: |
          set -euo pipefail
          gcloud sql instances describe "$CLOUD_SQL_INSTANCE" \
            --project "$PROJECT_ID" \
            --format=json > "$EVIDENCE_DIR/cloud-sql.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          doc = json.loads((Path(os.environ["EVIDENCE_DIR"]) / "cloud-sql.json").read_text())
          settings = doc.get("settings", {})
          errors = []
          if doc.get("state") != "STOPPED":
              errors.append("Cloud SQL must be stopped outside active test windows")
          if settings.get("activationPolicy") != "NEVER":
              errors.append("Cloud SQL activationPolicy must be NEVER")
          if settings.get("availabilityType") != "ZONAL":
              errors.append("Dark/staging Cloud SQL must be zonal before launch")
          if str(settings.get("dataDiskSizeGb")) not in {"20", "20.0"}:
              errors.append("Cloud SQL disk should stay at the 20GB floor before launch")
          if errors:
              raise SystemExit("; ".join(errors))
          PY

      - name: Collect Artifact Registry cleanup posture
        continue-on-error: true
        run: |
          set -euo pipefail
          gcloud artifacts repositories describe kresco-containers \
            --project "$PROJECT_ID" \
            --location "$REGION" \
            --format=json > "$EVIDENCE_DIR/artifact-registry.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          doc = json.loads((Path(os.environ["EVIDENCE_DIR"]) / "artifact-registry.json").read_text())
          policies = doc.get("cleanupPolicies") or {}
          if "delete-old-images" not in policies or "keep-latest-10" not in policies:
              raise SystemExit("Artifact Registry cleanup policies delete-old-images and keep-latest-10 are required.")
          PY

      - name: Collect private media bucket posture
        continue-on-error: true
        run: |
          set -euo pipefail
          normalize_secret_value() {
            case "$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')" in
              ""|"null"|"undefined"|"none") printf '' ;;
              *) printf '%s' "$1" ;;
            esac
          }
          runtime_json="$(mktemp)"
          gcloud secrets versions access latest \
            --project "$PROJECT_ID" \
            --secret kresco-runtime > "$runtime_json"
          media_bucket="$(normalize_secret_value "$(jq -r '.MEDIA_GCS_BUCKET // .media_gcs_bucket // empty' "$runtime_json")")"
          media_prefix="$(normalize_secret_value "$(jq -r '.MEDIA_GCS_PREFIX // .media_gcs_prefix // "media"' "$runtime_json")")"
          rm -f "$runtime_json"
          if [ -z "$media_bucket" ]; then
            echo "::error::MEDIA_GCS_BUCKET is missing from kresco-runtime."
            exit 1
          fi
          printf '{"bucket_configured":true,"prefix_configured":%s}\n' "$([ -n "$media_prefix" ] && echo true || echo false)" > "$EVIDENCE_DIR/media-runtime-config.json"
          if ! gcloud storage buckets describe "gs://$media_bucket" \
            --format=json > "$EVIDENCE_DIR/media-bucket.json" 2> "$EVIDENCE_DIR/media-bucket-error.txt"; then
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          detail = (evidence_dir / "media-bucket-error.txt").read_text(encoding="utf-8", errors="replace")
          (evidence_dir / "media-bucket-error.json").write_text(
              json.dumps({
                  "passed": False,
                  "error": "unable_to_describe_media_bucket",
                  "required_permission": "storage.buckets.get",
                  "detail": detail[:2000],
              }, indent=2),
              encoding="utf-8",
          )
          PY
            cat "$EVIDENCE_DIR/media-bucket-error.txt" >&2
            exit 1
          fi
          rm -f "$EVIDENCE_DIR/media-bucket-error.txt"
          if ! gcloud storage buckets get-iam-policy "gs://$media_bucket" \
            --format=json > "$EVIDENCE_DIR/media-bucket-iam.json" 2> "$EVIDENCE_DIR/media-bucket-iam-error.txt"; then
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          detail = (evidence_dir / "media-bucket-iam-error.txt").read_text(encoding="utf-8", errors="replace")
          (evidence_dir / "media-bucket-iam-error.json").write_text(
              json.dumps({
                  "passed": False,
                  "error": "unable_to_read_media_bucket_iam",
                  "required_permission": "storage.buckets.getIamPolicy",
                  "detail": detail[:2000],
              }, indent=2),
              encoding="utf-8",
          )
          PY
            cat "$EVIDENCE_DIR/media-bucket-iam-error.txt" >&2
            exit 1
          fi
          rm -f "$EVIDENCE_DIR/media-bucket-iam-error.txt"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          bucket = json.loads((evidence_dir / "media-bucket.json").read_text())
          iam = json.loads((evidence_dir / "media-bucket-iam.json").read_text())
          runtime = json.loads((evidence_dir / "media-runtime-config.json").read_text())
          errors = []
          iam_config = bucket.get("iamConfiguration", {})
          uniform_access = iam_config.get("uniformBucketLevelAccess", {}) if isinstance(iam_config, dict) else {}
          uniform_access_enabled = (
              bucket.get("uniform_bucket_level_access") is True
              or (isinstance(uniform_access, dict) and uniform_access.get("enabled") is True)
          )
          public_access_enforced = (
              bucket.get("public_access_prevention") == "enforced"
              or (isinstance(iam_config, dict) and iam_config.get("publicAccessPrevention") == "enforced")
          )
          lifecycle = bucket.get("lifecycle")
          lifecycle_config = bucket.get("lifecycle_config")
          lifecycle_rules_present = (
              (isinstance(lifecycle, dict) and bool(lifecycle.get("rule")))
              or (isinstance(lifecycle_config, dict) and bool(lifecycle_config.get("rule")))
          )
          if not uniform_access_enabled:
              errors.append("media bucket must enable uniform bucket-level access")
          if not public_access_enforced:
              errors.append("media bucket publicAccessPrevention must be enforced")
          if not lifecycle_rules_present:
              errors.append("media bucket lifecycle rules are required")
          if runtime.get("prefix_configured") is not True:
              errors.append("MEDIA_GCS_PREFIX must be configured")
          public_members = {"allUsers", "allAuthenticatedUsers"}
          for binding in iam.get("bindings", []):
              if public_members.intersection(set(binding.get("members", []))):
                  errors.append(f"media bucket IAM must not grant {binding.get('role')} to public principals")
          if errors:
              raise SystemExit("; ".join(errors))
          PY

      - name: Collect runtime smoke evidence
        continue-on-error: true
        run: |
          set -euo pipefail
          backend_url="$(gcloud run services describe "$BACKEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          frontend_url="$(gcloud run services describe "$FRONTEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          export BACKEND_URL="$backend_url"
          export FRONTEND_URL="$frontend_url"
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          backend_url = os.environ["BACKEND_URL"].rstrip("/") + "/health"
          frontend_url = os.environ["FRONTEND_URL"]
          with urllib.request.urlopen(backend_url, timeout=30) as response:
              backend = json.loads(response.read().decode("utf-8"))
          with urllib.request.urlopen(frontend_url, timeout=30) as response:
              frontend_status = response.getcode()
              frontend_body = response.read(8192).decode("utf-8", errors="replace")
          if frontend_status >= 400 or "<html" not in frontend_body.lower():
              raise SystemExit("Frontend smoke did not return HTML.")
          (evidence_dir / "runtime-smoke.json").write_text(json.dumps({
              "backend_health_url": backend_url,
              "backend_release_sha": backend.get("release_sha"),
              "frontend_url": frontend_url,
              "frontend_status": frontend_status,
          }, indent=2), encoding="utf-8")
          PY

      - name: Collect public subdomain routing evidence
        continue-on-error: true
        run: |
          set +e
          python scripts/check_subdomain_routing.py \
            --apex-url "$STAGING_FRONTEND_APEX_URL" \
            --hsts-policy no-include-subdomains \
            --required > "$EVIDENCE_DIR/subdomain-routing.txt" 2> "$EVIDENCE_DIR/subdomain-routing.stderr.txt"
          status=$?
          printf '{"exit_code":%s}\n' "$status" > "$EVIDENCE_DIR/subdomain-routing.status.json"
          exit 0

      - name: Collect public API release evidence
        continue-on-error: true
        run: |
          set +e
          python - <<'PY' > "$EVIDENCE_DIR/public-api-health.stdout.txt" 2> "$EVIDENCE_DIR/public-api-health.stderr.txt"
          import json
          import os
          import sys
          import urllib.request
          from pathlib import Path

          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          runtime = json.loads((evidence_dir / "runtime-smoke.json").read_text(encoding="utf-8"))
          expected_sha = str(runtime.get("backend_release_sha") or "").strip()
          api_url = os.environ["STAGING_PUBLIC_API_URL"].rstrip("/")
          result = {
              "api_url": api_url,
              "ready_url": f"{api_url}/ready",
              "health_url": f"{api_url}/health",
              "expected_sha": expected_sha,
          }
          errors = []

          def fetch_json(url):
              with urllib.request.urlopen(url, timeout=30) as response:
                  return response.getcode(), json.loads(response.read().decode("utf-8"))

          try:
              ready_status, ready = fetch_json(result["ready_url"])
              health_status, health = fetch_json(result["health_url"])
              result.update({
                  "ready_status_code": ready_status,
                  "ready_status": ready.get("status"),
                  "health_status_code": health_status,
                  "release_sha": health.get("release_sha"),
              })
              if not expected_sha:
                  errors.append("runtime smoke did not capture backend_release_sha.")
              if ready_status >= 400:
                  errors.append(f"public API /ready returned {ready_status}.")
              if ready.get("status") != "ready":
                  errors.append(f"public API /ready status was {ready.get('status')!r}, expected 'ready'.")
              if health_status >= 400:
                  errors.append(f"public API /health returned {health_status}.")
              if health.get("release_sha") != expected_sha:
                  errors.append(f"public API release_sha was {health.get('release_sha')!r}, expected {expected_sha!r}.")
          except Exception as exc:
              errors.append(f"public API health check failed: {exc}")

          result["passed"] = not errors
          result["errors"] = errors
          (evidence_dir / "public-api-health.json").write_text(json.dumps(result, indent=2, sort_keys=True), encoding="utf-8")
          if errors:
              for error in errors:
                  print(f"error: {error}", file=sys.stderr)
              raise SystemExit(1)
          print(f"Public API release evidence passed for {api_url}.")
          PY
          status=$?
          printf '{"exit_code":%s}\n' "$status" > "$EVIDENCE_DIR/public-api-health.status.json"
          exit 0

      - name: Collect public auth readiness
        continue-on-error: true
        run: |
          set -euo pipefail
          normalize_secret_value() {
            case "$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')" in
              ""|"null"|"undefined"|"none") printf '' ;;
              *) printf '%s' "$1" ;;
            esac
          }
          runtime_json="$(mktemp)"
          gcloud secrets versions access latest --project "$PROJECT_ID" --secret kresco-runtime > "$runtime_json"
          firebase_project_id="$(normalize_secret_value "$(jq -r '.NEXT_PUBLIC_FIREBASE_PROJECT_ID // .FIREBASE_PROJECT_ID // .firebase_project_id // empty' "$runtime_json")")"
          rm -f "$runtime_json"
          python scripts/check_public_auth_readiness.py \
            --project-id "${firebase_project_id:-$PROJECT_ID}" \
            --runtime-secret-name kresco-runtime \
            --frontend-apex-url "$STAGING_FRONTEND_APEX_URL" \
            --api-host "$STAGING_API_HOST" \
            --require-email-password \
            --require-google-provider \
            --require-phone-provider \
            --json > "$EVIDENCE_DIR/public-auth-readiness.json"

      - name: Evaluate staging launch evidence
        if: always()
        run: python scripts/check_staging_launch_evidence.py "$EVIDENCE_DIR"

      - name: Upload staging launch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-launch-evidence
          path: artifacts/staging-launch-evidence
          if-no-files-found: error
