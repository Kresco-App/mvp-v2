name: Staging Launch Evidence

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    environment: staging
    env:
      PROJECT_ID: kresco-staging
      REGION: europe-southwest1
      BACKEND_SERVICE: kresco-backend-staging
      FRONTEND_SERVICE: kresco-frontend-staging
      CLOUD_SQL_INSTANCE: kresco-staging-postgres
      EVIDENCE_DIR: artifacts/staging-launch-evidence

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Prepare evidence directory
        run: |
          mkdir -p "$EVIDENCE_DIR"
          printf '%s\n' '{"passed":false,"errors":["staging launch evidence collection did not finish"]}' > "$EVIDENCE_DIR/evidence-manifest.json"

      - name: Collect Cloud Run posture
        continue-on-error: true
        run: |
          set -euo pipefail
          gcloud run services describe "$BACKEND_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format=json > "$EVIDENCE_DIR/backend-cloud-run.json"
          gcloud run services describe "$FRONTEND_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format=json > "$EVIDENCE_DIR/frontend-cloud-run.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          errors = []
          for name in ("backend", "frontend"):
              doc = json.loads((evidence_dir / f"{name}-cloud-run.json").read_text())
              annotations = doc.get("spec", {}).get("template", {}).get("metadata", {}).get("annotations", {})
              if annotations.get("autoscaling.knative.dev/minScale", "0") not in {"0", ""}:
                  errors.append(f"{name} minScale must be 0")
              if annotations.get("autoscaling.knative.dev/maxScale") not in {"3", 3}:
                  errors.append(f"{name} maxScale must be 3")
              if doc.get("status", {}).get("conditions", []) and not any(
                  item.get("type") == "Ready" and item.get("status") == "True"
                  for item in doc["status"]["conditions"]
              ):
                  errors.append(f"{name} Cloud Run service is not Ready")
          if errors:
              raise SystemExit("; ".join(errors))
          PY

      - name: Collect Cloud SQL cost posture
        continue-on-error: true
        run: |
          set -euo pipefail
          gcloud sql instances describe "$CLOUD_SQL_INSTANCE" \
            --project "$PROJECT_ID" \
            --format=json > "$EVIDENCE_DIR/cloud-sql.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          doc = json.loads((Path(os.environ["EVIDENCE_DIR"]) / "cloud-sql.json").read_text())
          settings = doc.get("settings", {})
          errors = []
          if doc.get("state") != "STOPPED":
              errors.append("Cloud SQL must be stopped outside active test windows")
          if settings.get("activationPolicy") != "NEVER":
              errors.append("Cloud SQL activationPolicy must be NEVER")
          if settings.get("availabilityType") != "ZONAL":
              errors.append("Dark/staging Cloud SQL must be zonal before launch")
          if str(settings.get("dataDiskSizeGb")) not in {"20", "20.0"}:
              errors.append("Cloud SQL disk should stay at the 20GB floor before launch")
          if errors:
              raise SystemExit("; ".join(errors))
          PY

      - name: Collect Artifact Registry cleanup posture
        continue-on-error: true
        run: |
          set -euo pipefail
          gcloud artifacts repositories describe kresco-containers \
            --project "$PROJECT_ID" \
            --location "$REGION" \
            --format=json > "$EVIDENCE_DIR/artifact-registry.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          doc = json.loads((Path(os.environ["EVIDENCE_DIR"]) / "artifact-registry.json").read_text())
          policies = doc.get("cleanupPolicies") or {}
          if "delete-old-images" not in policies or "keep-latest-10" not in policies:
              raise SystemExit("Artifact Registry cleanup policies delete-old-images and keep-latest-10 are required.")
          PY

      - name: Collect private media bucket posture
        continue-on-error: true
        run: |
          set -euo pipefail
          runtime_json="$(mktemp)"
          gcloud secrets versions access latest \
            --project "$PROJECT_ID" \
            --secret kresco-runtime > "$runtime_json"
          media_bucket="$(jq -r '.MEDIA_GCS_BUCKET // .media_gcs_bucket // empty' "$runtime_json")"
          media_prefix="$(jq -r '.MEDIA_GCS_PREFIX // .media_gcs_prefix // "media"' "$runtime_json")"
          rm -f "$runtime_json"
          if [ -z "$media_bucket" ]; then
            echo "::error::MEDIA_GCS_BUCKET is missing from kresco-runtime."
            exit 1
          fi
          printf '{"bucket_configured":true,"prefix_configured":%s}\n' "$([ -n "$media_prefix" ] && echo true || echo false)" > "$EVIDENCE_DIR/media-runtime-config.json"
          if ! gcloud storage buckets describe "gs://$media_bucket" \
            --format=json > "$EVIDENCE_DIR/media-bucket.json" 2> "$EVIDENCE_DIR/media-bucket-error.txt"; then
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          detail = (evidence_dir / "media-bucket-error.txt").read_text(encoding="utf-8", errors="replace")
          (evidence_dir / "media-bucket-error.json").write_text(
              json.dumps({
                  "passed": False,
                  "error": "unable_to_describe_media_bucket",
                  "required_permission": "storage.buckets.get",
                  "detail": detail[:2000],
              }, indent=2),
              encoding="utf-8",
          )
          PY
            cat "$EVIDENCE_DIR/media-bucket-error.txt" >&2
            exit 1
          fi
          rm -f "$EVIDENCE_DIR/media-bucket-error.txt"
          if ! gcloud storage buckets get-iam-policy "gs://$media_bucket" \
            --format=json > "$EVIDENCE_DIR/media-bucket-iam.json" 2> "$EVIDENCE_DIR/media-bucket-iam-error.txt"; then
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          detail = (evidence_dir / "media-bucket-iam-error.txt").read_text(encoding="utf-8", errors="replace")
          (evidence_dir / "media-bucket-iam-error.json").write_text(
              json.dumps({
                  "passed": False,
                  "error": "unable_to_read_media_bucket_iam",
                  "required_permission": "storage.buckets.getIamPolicy",
                  "detail": detail[:2000],
              }, indent=2),
              encoding="utf-8",
          )
          PY
            cat "$EVIDENCE_DIR/media-bucket-iam-error.txt" >&2
            exit 1
          fi
          rm -f "$EVIDENCE_DIR/media-bucket-iam-error.txt"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          bucket = json.loads((evidence_dir / "media-bucket.json").read_text())
          iam = json.loads((evidence_dir / "media-bucket-iam.json").read_text())
          runtime = json.loads((evidence_dir / "media-runtime-config.json").read_text())
          errors = []
          iam_config = bucket.get("iamConfiguration", {})
          uniform_access = iam_config.get("uniformBucketLevelAccess", {})
          if uniform_access.get("enabled") is not True:
              errors.append("media bucket must enable uniform bucket-level access")
          if iam_config.get("publicAccessPrevention") != "enforced":
              errors.append("media bucket publicAccessPrevention must be enforced")
          if not bucket.get("lifecycle", {}).get("rule"):
              errors.append("media bucket lifecycle rules are required")
          if runtime.get("prefix_configured") is not True:
              errors.append("MEDIA_GCS_PREFIX must be configured")
          public_members = {"allUsers", "allAuthenticatedUsers"}
          for binding in iam.get("bindings", []):
              if public_members.intersection(set(binding.get("members", []))):
                  errors.append(f"media bucket IAM must not grant {binding.get('role')} to public principals")
          if errors:
              raise SystemExit("; ".join(errors))
          PY

      - name: Collect runtime smoke evidence
        continue-on-error: true
        run: |
          set -euo pipefail
          backend_url="$(gcloud run services describe "$BACKEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          frontend_url="$(gcloud run services describe "$FRONTEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          export BACKEND_URL="$backend_url"
          export FRONTEND_URL="$frontend_url"
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          evidence_dir = Path(os.environ["EVIDENCE_DIR"])
          backend_url = os.environ["BACKEND_URL"].rstrip("/") + "/health"
          frontend_url = os.environ["FRONTEND_URL"]
          with urllib.request.urlopen(backend_url, timeout=30) as response:
              backend = json.loads(response.read().decode("utf-8"))
          with urllib.request.urlopen(frontend_url, timeout=30) as response:
              frontend_status = response.getcode()
              frontend_body = response.read(8192).decode("utf-8", errors="replace")
          if frontend_status >= 400 or "<html" not in frontend_body.lower():
              raise SystemExit("Frontend smoke did not return HTML.")
          (evidence_dir / "runtime-smoke.json").write_text(json.dumps({
              "backend_health_url": backend_url,
              "backend_release_sha": backend.get("release_sha"),
              "frontend_url": frontend_url,
              "frontend_status": frontend_status,
          }, indent=2), encoding="utf-8")
          PY

      - name: Evaluate staging launch evidence
        if: always()
        run: python scripts/check_staging_launch_evidence.py "$EVIDENCE_DIR"

      - name: Upload staging launch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-launch-evidence
          path: artifacts/staging-launch-evidence
          if-no-files-found: error
