name: Staging Live Chat Load Evidence

on:
  workflow_dispatch:
    inputs:
      samples:
        description: "Measured request samples per endpoint"
        required: true
        default: "5"
      warmups:
        description: "Warmup requests per endpoint"
        required: true
        default: "1"

permissions:
  contents: read
  id-token: write

concurrency:
  group: staging-cloud-sql-${{ github.repository }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    environment: staging
    env:
      PROJECT_ID: kresco-staging
      REGION: europe-southwest1
      BACKEND_SERVICE: kresco-backend-staging
      CLOUD_SQL_INSTANCE: kresco-staging-postgres
      EVIDENCE_DIR: artifacts/staging-live-chat-load
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve Firebase public API key
        run: |
          set -euo pipefail
          normalize_secret_value() {
            case "$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')" in
              ""|"null"|"undefined"|"none") printf '' ;;
              *) printf '%s' "$1" ;;
            esac
          }
          runtime_json="$(mktemp)"
          gcloud secrets versions access latest --project "$PROJECT_ID" --secret kresco-runtime > "$runtime_json"
          firebase_api_key="$(normalize_secret_value "$(jq -r '.NEXT_PUBLIC_FIREBASE_API_KEY // .FIREBASE_WEB_API_KEY // empty' "$runtime_json")")"
          rm -f "$runtime_json"
          if [ -n "$firebase_api_key" ]; then
            echo "::add-mask::$firebase_api_key"
          fi
          echo "FIREBASE_API_KEY=$firebase_api_key" >> "$GITHUB_ENV"

      - name: Prepare evidence directory
        run: mkdir -p "$EVIDENCE_DIR"

      - name: Collect live chat load evidence
        env:
          STAGING_AUTH_SMOKE_EMAIL: ${{ secrets.STAGING_AUTH_SMOKE_EMAIL }}
          STAGING_AUTH_SMOKE_PASSWORD: ${{ secrets.STAGING_AUTH_SMOKE_PASSWORD }}
          staging_live_session_id: ${{ vars.STAGING_LIVE_SESSION_ID }}
          staging_chat_conversation_id: ${{ vars.STAGING_CHAT_CONVERSATION_ID }}
        run: |
          set -euo pipefail
          if [ -z "$STAGING_AUTH_SMOKE_EMAIL" ] || [ -z "$STAGING_AUTH_SMOKE_PASSWORD" ] || [ -z "$FIREBASE_API_KEY" ]; then
            python scripts/run_evidence_command.py \
              --name staging-live-chat-load \
              --output "$EVIDENCE_DIR/live-chat-load.json" \
              --require-json \
              -- \
              python scripts/check_staging_live_chat_load.py \
                --backend-url "https://staging-preflight.invalid" \
                --firebase-api-key "$FIREBASE_API_KEY" \
                --auth-email "$STAGING_AUTH_SMOKE_EMAIL" \
                --auth-password "$STAGING_AUTH_SMOKE_PASSWORD" \
                --live-session-id "$staging_live_session_id" \
                --conversation-id "$staging_chat_conversation_id" \
                --contract \
                --json
          fi
          cleanup() {
            gcloud sql instances patch "$CLOUD_SQL_INSTANCE" \
              --project "$PROJECT_ID" \
              --activation-policy NEVER \
              --quiet || true
          }
          trap cleanup EXIT
          gcloud sql instances patch "$CLOUD_SQL_INSTANCE" \
            --project "$PROJECT_ID" \
            --activation-policy ALWAYS \
            --quiet
          for attempt in {1..90}; do
            state="$(gcloud sql instances describe "$CLOUD_SQL_INSTANCE" --project "$PROJECT_ID" --format='value(state)')"
            if [ "$state" = "RUNNABLE" ]; then
              break
            fi
            echo "Waiting for Cloud SQL instance $CLOUD_SQL_INSTANCE to become RUNNABLE; current state=$state"
            sleep 10
          done
          if [ "$state" != "RUNNABLE" ]; then
            echo "::error::Cloud SQL instance $CLOUD_SQL_INSTANCE did not become RUNNABLE within 15 minutes."
            exit 1
          fi
          backend_url="$(gcloud run services describe "$BACKEND_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format='value(status.url)')"
          python scripts/run_evidence_command.py \
            --name staging-live-chat-load \
            --output "$EVIDENCE_DIR/live-chat-load.json" \
            --require-json \
            -- \
            python scripts/check_staging_live_chat_load.py \
              --backend-url "$backend_url" \
              --firebase-api-key "$FIREBASE_API_KEY" \
              --auth-email "$STAGING_AUTH_SMOKE_EMAIL" \
              --auth-password "$STAGING_AUTH_SMOKE_PASSWORD" \
              --live-session-id "$staging_live_session_id" \
              --conversation-id "$staging_chat_conversation_id" \
              --samples "${{ inputs.samples }}" \
              --warmups "${{ inputs.warmups }}" \
              --json

      - name: Upload staging live chat load evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-live-chat-load
          path: artifacts/staging-live-chat-load
          if-no-files-found: error
