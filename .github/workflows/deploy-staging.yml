name: Deploy Staging

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "frontend/**"
      - "firebase-hosting-public/**"
      - "firebase.json"
      - ".firebaserc"
      - "scripts/**"
      - ".github/workflows/**"
      - "infra/terraform/**"
  workflow_dispatch:
    inputs:
      stop_cloud_sql_after_smoke:
        description: "Stop staging Cloud SQL after smoke when immediate cost control is needed"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: staging-cloud-sql-${{ github.repository }}
  cancel-in-progress: false

jobs:
  backend-ci:
    name: Backend CI
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/master' }}
    uses: ./.github/workflows/ci-backend.yml

  frontend-ci:
    name: Frontend CI
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/master' }}
    uses: ./.github/workflows/ci-frontend.yml

  plan-staging:
    name: Plan Staging Deploy
    runs-on: ubuntu-latest
    outputs:
      deploy_backend: ${{ steps.plan.outputs.deploy_backend }}
      deploy_frontend: ${{ steps.plan.outputs.deploy_frontend }}
      deploy_hosting: ${{ steps.plan.outputs.deploy_hosting }}
      reason: ${{ steps.plan.outputs.reason }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Plan changed deploy targets
        id: plan
        run: |
          set -euo pipefail
          event_name="${{ github.event_name }}"
          before="${{ github.event.before }}"
          changed_paths="$(mktemp)"
          if [ "$event_name" = "workflow_dispatch" ]; then
            : > "$changed_paths"
          elif [ -n "$before" ] && ! [[ "$before" =~ ^0+$ ]]; then
            git diff --name-only "$before" "$GITHUB_SHA" > "$changed_paths"
          else
            git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" > "$changed_paths"
          fi
          echo "Changed paths:"
          if [ -s "$changed_paths" ]; then
            sed 's/^/- /' "$changed_paths"
          else
            echo "- none"
          fi
          python scripts/plan_staging_deploy.py \
            --event-name "$event_name" \
            --output-file "$GITHUB_OUTPUT" < "$changed_paths"

  deploy-backend:
    name: Deploy Backend
    needs:
      - backend-ci
      - frontend-ci
      - plan-staging
    if: ${{ !cancelled() && (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') && (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped') && needs.plan-staging.outputs.deploy_backend == 'true' }}
    uses: ./.github/workflows/deploy-backend.yml
    with:
      environment: staging
      run_migrations: true
      confirm_production_dark_deploy: false
      enforce_production_launch_gate: false
    secrets: inherit

  deploy-frontend:
    name: Deploy Frontend
    needs:
      - backend-ci
      - frontend-ci
      - plan-staging
      - deploy-backend
    if: ${{ !cancelled() && (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') && (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped') && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') && needs.plan-staging.outputs.deploy_frontend == 'true' }}
    uses: ./.github/workflows/deploy-frontend.yml
    with:
      environment: staging
      confirm_production_dark_deploy: false
      enforce_production_launch_gate: false
      hsts_include_subdomains: false
    secrets: inherit

  deploy-hosting:
    name: Deploy Firebase Hosting Edge
    needs:
      - backend-ci
      - frontend-ci
      - plan-staging
      - deploy-backend
      - deploy-frontend
    if: ${{ !cancelled() && (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') && (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped') && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') && (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped') && needs.plan-staging.outputs.deploy_hosting == 'true' }}
    uses: ./.github/workflows/deploy-firebase-hosting.yml
    with:
      environment: staging
      confirm_production_hosting_deploy: false
      ensure_custom_domains: true
    secrets: inherit

  staging-smoke:
    name: Staging Smoke
    needs:
      - backend-ci
      - frontend-ci
      - plan-staging
      - deploy-backend
      - deploy-frontend
      - deploy-hosting
    if: ${{ !cancelled() && (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') && (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped') && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') && (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped') && (needs.deploy-hosting.result == 'success' || needs.deploy-hosting.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: staging
    env:
      PROJECT_ID: kresco-staging
      REGION: europe-southwest1
      CLOUD_SQL_INSTANCE: kresco-staging-postgres
      BACKEND_SERVICE: kresco-backend-staging
      FRONTEND_SERVICE: kresco-frontend-staging
      DEPLOY_BACKEND: ${{ needs.plan-staging.outputs.deploy_backend }}
      DEPLOY_FRONTEND: ${{ needs.plan-staging.outputs.deploy_frontend }}
      DEPLOY_HOSTING: ${{ needs.plan-staging.outputs.deploy_hosting }}
      DEPLOY_PLAN_REASON: ${{ needs.plan-staging.outputs.reason }}
      STAGING_AUTH_SMOKE_EMAIL: ${{ secrets.STAGING_AUTH_SMOKE_EMAIL }}
      STAGING_AUTH_SMOKE_PASSWORD: ${{ secrets.STAGING_AUTH_SMOKE_PASSWORD }}
      STAGING_AUTH_BASIC_EMAIL: ${{ secrets.STAGING_AUTH_BASIC_EMAIL }}
      STAGING_AUTH_BASIC_PASSWORD: ${{ secrets.STAGING_AUTH_BASIC_PASSWORD }}
      STAGING_AUTH_STUDENT_EMAIL: ${{ secrets.STAGING_AUTH_STUDENT_EMAIL }}
      STAGING_AUTH_STUDENT_PASSWORD: ${{ secrets.STAGING_AUTH_STUDENT_PASSWORD }}
      STAGING_AUTH_VIP_EMAIL: ${{ secrets.STAGING_AUTH_VIP_EMAIL }}
      STAGING_AUTH_VIP_PASSWORD: ${{ secrets.STAGING_AUTH_VIP_PASSWORD }}
      STAGING_AUTH_ADMIN_EMAIL: ${{ secrets.STAGING_AUTH_ADMIN_EMAIL }}
      STAGING_AUTH_ADMIN_PASSWORD: ${{ secrets.STAGING_AUTH_ADMIN_PASSWORD }}
      STAGING_AUTH_STAFF_EMAIL: ${{ secrets.STAGING_AUTH_STAFF_EMAIL }}
      STAGING_AUTH_STAFF_PASSWORD: ${{ secrets.STAGING_AUTH_STAFF_PASSWORD }}
      STAGING_AUTH_PROFESSOR_EMAIL: ${{ secrets.STAGING_AUTH_PROFESSOR_EMAIL }}
      STAGING_AUTH_PROFESSOR_PASSWORD: ${{ secrets.STAGING_AUTH_PROFESSOR_PASSWORD }}
      STAGING_FRONTEND_APEX_URL: https://staging.kresco.ma
      STAGING_PUBLIC_API_URL: https://api.staging.kresco.ma
      STOP_CLOUD_SQL_AFTER_SMOKE: ${{ github.event_name == 'workflow_dispatch' && inputs.stop_cloud_sql_after_smoke == true }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve current Cloud Run release state
        run: |
          set -euo pipefail
          write_service_state() {
            service_name="$1"
            prefix="$2"
            release_env_name="$3"
            service_json="$(mktemp)"
            gcloud run services describe "$service_name" \
              --project "$PROJECT_ID" \
              --region "$REGION" \
              --format=json > "$service_json"
            service_url="$(jq -r '.status.url // empty' "$service_json")"
            revision="$(jq -r '.status.latestReadyRevisionName // empty' "$service_json")"
            image="$(jq -r '.spec.template.spec.containers[0].image // empty' "$service_json")"
            release_sha="$(jq -r --arg name "$release_env_name" '.spec.template.spec.containers[0].env[]? | select(.name == $name) | .value // empty' "$service_json")"
            if [ -z "$service_url" ] || [ -z "$revision" ] || [ -z "$image" ] || [ -z "$release_sha" ]; then
              echo "::error::$service_name is missing url, revision, image, or $release_env_name."
              cat "$service_json"
              exit 1
            fi
            image_digest=""
            if [[ "$image" == *@sha256:* ]]; then
              image_digest="${image##*@}"
            fi
            {
              echo "${prefix}_URL=$service_url"
              echo "${prefix}_REVISION=$revision"
              echo "${prefix}_IMAGE=$image"
              echo "${prefix}_IMAGE_DIGEST=$image_digest"
              echo "${prefix}_SHA=$release_sha"
            } >> "$GITHUB_ENV"
            rm -f "$service_json"
          }

          write_service_state "$BACKEND_SERVICE" "BACKEND" "KRESCO_RELEASE_SHA"
          write_service_state "$FRONTEND_SERVICE" "FRONTEND" "NEXT_PUBLIC_RELEASE_SHA"
          echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Resolve Firebase public API key
        run: |
          set -euo pipefail
          normalize_secret_value() {
            case "$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')" in
              ""|"null"|"undefined"|"none") printf '' ;;
              *) printf '%s' "$1" ;;
            esac
          }
          runtime_json="$(mktemp)"
          gcloud secrets versions access latest --project "$PROJECT_ID" --secret kresco-runtime > "$runtime_json"
          firebase_api_key="$(normalize_secret_value "$(jq -r '.NEXT_PUBLIC_FIREBASE_API_KEY // .FIREBASE_WEB_API_KEY // empty' "$runtime_json")")"
          firebase_project_id="$(normalize_secret_value "$(jq -r '.NEXT_PUBLIC_FIREBASE_PROJECT_ID // .FIREBASE_PROJECT_ID // .firebase_project_id // empty' "$runtime_json")")"
          rm -f "$runtime_json"
          if [ -n "$firebase_api_key" ]; then
            echo "::add-mask::$firebase_api_key"
          fi
          echo "FIREBASE_API_KEY=$firebase_api_key" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=${firebase_project_id:-$PROJECT_ID}" >> "$GITHUB_ENV"

      - name: Run staging smoke checks
        run: |
          set -euo pipefail
          cleanup() {
            if [ "${STOP_CLOUD_SQL_AFTER_SMOKE:-false}" = "true" ]; then
              gcloud sql instances patch "$CLOUD_SQL_INSTANCE" \
                --project "$PROJECT_ID" \
                --activation-policy NEVER \
                --quiet || true
            else
              echo "Leaving Cloud SQL running; scheduled stop workflow handles cost control."
            fi
          }
          trap cleanup EXIT
          python scripts/check_public_auth_readiness.py \
            --project-id "$FIREBASE_PROJECT_ID" \
            --runtime-secret-name kresco-runtime \
            --frontend-apex-url "$STAGING_FRONTEND_APEX_URL" \
            --api-host api.staging.kresco.ma \
            --ensure-authorized-domains \
            --require-email-password \
            --require-google-provider \
            --require-phone-provider
          gcloud sql instances patch "$CLOUD_SQL_INSTANCE" \
            --project "$PROJECT_ID" \
            --activation-policy ALWAYS \
            --quiet
          for attempt in {1..90}; do
            state="$(gcloud sql instances describe "$CLOUD_SQL_INSTANCE" --project "$PROJECT_ID" --format='value(state)')"
            if [ "$state" = "RUNNABLE" ]; then
              break
            fi
            echo "Waiting for Cloud SQL instance $CLOUD_SQL_INSTANCE to become RUNNABLE; current state=$state"
            sleep 10
          done
          if [ "$state" != "RUNNABLE" ]; then
            echo "::error::Cloud SQL instance $CLOUD_SQL_INSTANCE did not become RUNNABLE within 15 minutes."
            exit 1
          fi
          python scripts/check_staging_deployment.py \
            --backend-url "$BACKEND_URL" \
            --public-api-url "$STAGING_PUBLIC_API_URL" \
            --frontend-url "$FRONTEND_URL" \
            --subdomain-apex-url "$STAGING_FRONTEND_APEX_URL" \
            --expected-sha "$SHORT_SHA" \
            --expected-backend-sha "$BACKEND_SHA" \
            --expected-frontend-sha "$FRONTEND_SHA" \
            --project-id "$PROJECT_ID" \
            --region "$REGION" \
            --frontend-service "$FRONTEND_SERVICE" \
            --firebase-project-id "$FIREBASE_PROJECT_ID" \
            --firebase-api-key "$FIREBASE_API_KEY"

      - name: Write staging deployment summary
        run: |
          {
            echo "### Staging deployment"
            echo ""
            echo "- Plan reason: $DEPLOY_PLAN_REASON"
            echo "- Backend deploy job requested: $DEPLOY_BACKEND"
            echo "- Frontend deploy job requested: $DEPLOY_FRONTEND"
            echo "- Hosting deploy job requested: $DEPLOY_HOSTING"
            echo "- Backend URL: $BACKEND_URL"
            echo "- Frontend URL: $FRONTEND_URL"
            echo "- Backend revision: $BACKEND_REVISION"
            echo "- Frontend revision: $FRONTEND_REVISION"
            echo "- Backend image: $BACKEND_IMAGE"
            echo "- Frontend image: $FRONTEND_IMAGE"
            echo "- Backend image digest: ${BACKEND_IMAGE_DIGEST:-not returned}"
            echo "- Frontend image digest: ${FRONTEND_IMAGE_DIGEST:-not returned}"
            echo "- Backend commit: $BACKEND_SHA"
            echo "- Frontend commit: $FRONTEND_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
