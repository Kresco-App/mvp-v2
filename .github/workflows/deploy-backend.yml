# Deploy FastAPI to AWS Lambda
name: Deploy FastAPI to AWS Lambda

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Zappa stage to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      confirm_database_migration:
        description: 'Required for production: confirm that the migration plan and backup/restore path have been reviewed'
        required: true
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.stage }}
    env:
      CI_POSTGRES_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kresco_deploy_check
      ZAPPA_STAGE: ${{ inputs.stage }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kresco_deploy_check
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kresco_deploy_check"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Check repository hygiene
        run: python scripts/check_repo_hygiene.py

      - name: Check secret hygiene
        run: python scripts/check_secret_hygiene.py

      - name: Enforce production launch gate
        if: ${{ env.ZAPPA_STAGE == 'production' }}
        run: python scripts/check_production_launch_gate.py

      - name: Require production database migration confirmation
        if: ${{ env.ZAPPA_STAGE == 'production' && inputs.confirm_database_migration != true }}
        run: |
          echo "Production deploys require confirm_database_migration=true after reviewing the migration plan and restore path."
          exit 1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Require production CloudWatch alarms
        if: ${{ env.ZAPPA_STAGE == 'production' }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDWATCH_ALARM_NAMES:-}" ]; then
            echo "Set CLOUDWATCH_ALARM_NAMES to comma-separated alarms covering Request5xx, UnhandledException, ClientError, and ReadinessError."
            exit 1
          fi
          IFS=',' read -ra alarm_names <<< "$CLOUDWATCH_ALARM_NAMES"
          normalized_alarm_names=()
          for alarm_name in "${alarm_names[@]}"; do
            alarm_name="$(echo "$alarm_name" | xargs)"
            if [ -n "$alarm_name" ]; then
              normalized_alarm_names+=("$alarm_name")
            fi
          done
          if [ "${#normalized_alarm_names[@]}" -lt 4 ]; then
            echo "CLOUDWATCH_ALARM_NAMES must list at least four alarms: Request5xx, UnhandledException, ClientError, and ReadinessError."
            exit 1
          fi
          found="$(aws cloudwatch describe-alarms \
            --alarm-names "${normalized_alarm_names[@]}" \
            --query 'MetricAlarms[].AlarmName' \
            --output text)"
          for alarm_name in "${normalized_alarm_names[@]}"; do
            if ! grep -Fq "$alarm_name" <<< "$found"; then
              echo "Required CloudWatch alarm is missing: $alarm_name"
              exit 1
            fi
          done
        env:
          CLOUDWATCH_ALARM_NAMES: ${{ vars.CLOUDWATCH_ALARM_NAMES }}

      - name: Install Dependencies
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Alembic migration check on Postgres
        run: |
          cd backend
          source venv/bin/activate
          DATABASE_URL="$CI_POSTGRES_DATABASE_URL" alembic upgrade head

      - name: Run data integrity audit on Postgres
        run: |
          cd backend
          source venv/bin/activate
          DATABASE_URL="$CI_POSTGRES_DATABASE_URL" python scripts/audit_data_integrity.py

      - name: Run query plan audit on Postgres
        run: |
          cd backend
          source venv/bin/activate
          DATABASE_URL="$CI_POSTGRES_DATABASE_URL" python scripts/audit_query_plans.py

      - name: Backend startup check
        run: |
          cd backend
          source venv/bin/activate
          python -c "from app.main import create_app; app = create_app(); print(app.title)"
        env:
          JWT_SECRET_KEY: test-secret-key-for-ci-32-bytes-minimum
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"

      - name: Run backend tests
        run: |
          cd backend
          source venv/bin/activate
          python -m pytest --cov=app --cov=scripts --cov-report=term-missing:skip-covered --cov-report=xml -q

      - name: Capture production database snapshot before migration
        if: ${{ env.ZAPPA_STAGE == 'production' }}
        run: |
          set -euo pipefail
          snapshot_id="kresco-${ZAPPA_STAGE}-pre-migration-${GITHUB_RUN_ID}"
          if [ -n "${RDS_DB_CLUSTER_IDENTIFIER:-}" ]; then
            aws rds create-db-cluster-snapshot \
              --db-cluster-identifier "$RDS_DB_CLUSTER_IDENTIFIER" \
              --db-cluster-snapshot-identifier "$snapshot_id"
            aws rds wait db-cluster-snapshot-available \
              --db-cluster-snapshot-identifier "$snapshot_id"
          elif [ -n "${RDS_DB_INSTANCE_IDENTIFIER:-}" ]; then
            aws rds create-db-snapshot \
              --db-instance-identifier "$RDS_DB_INSTANCE_IDENTIFIER" \
              --db-snapshot-identifier "$snapshot_id"
            aws rds wait db-snapshot-available \
              --db-snapshot-identifier "$snapshot_id"
          else
            echo "Set RDS_DB_CLUSTER_IDENTIFIER or RDS_DB_INSTANCE_IDENTIFIER for production migration backups."
            exit 1
          fi
        env:
          RDS_DB_CLUSTER_IDENTIFIER: ${{ vars.RDS_DB_CLUSTER_IDENTIFIER }}
          RDS_DB_INSTANCE_IDENTIFIER: ${{ vars.RDS_DB_INSTANCE_IDENTIFIER }}

      - name: Record production migration revision before migration
        if: ${{ env.ZAPPA_STAGE == 'production' }}
        run: |
          cd backend
          source venv/bin/activate
          DATABASE_URL="${{ secrets.DATABASE_URL }}" alembic current
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_CONNECTION_STRATEGY: rds_proxy
          PGSSLROOTCERT: certs/rds-global-bundle.pem

      - name: Run Alembic Migrations
        run: |
          cd backend
          source venv/bin/activate
          DATABASE_URL="${{ secrets.DATABASE_URL }}" alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_CONNECTION_STRATEGY: rds_proxy
          PGSSLROOTCERT: certs/rds-global-bundle.pem

      - name: Render Zappa environment
        run: |
          cd backend
          source venv/bin/activate
          python scripts/render_zappa_settings.py zappa_settings.json "$ZAPPA_STAGE"
        env:
          KRESCO_RUNTIME_SECRET_ID: ${{ vars.KRESCO_RUNTIME_SECRET_ID }}
          KRESCO_RELEASE_SHA: ${{ github.sha }}
          DATABASE_CONNECTION_STRATEGY: rds_proxy
          PGSSLROOTCERT: certs/rds-global-bundle.pem
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          CORS_ALLOW_ORIGIN_REGEX: ${{ vars.CORS_ALLOW_ORIGIN_REGEX }}

      - name: Deploy to Lambda
        run: |
          cd backend
          source venv/bin/activate
          zappa deploy "$ZAPPA_STAGE" || zappa update "$ZAPPA_STAGE"

      - name: Schedule realtime outbox worker
        run: |
          cd backend
          source venv/bin/activate
          zappa schedule "$ZAPPA_STAGE"

      - name: Post-deploy staging runtime verification
        run: python scripts/check_staging_runtime.py "${{ vars.BACKEND_READY_URL }}"
        env:
          KRESCO_INTERNAL_SECRET: ${{ secrets.REALTIME_OUTBOX_SECRET }}
