# Deploy FastAPI to AWS Lambda
name: Deploy FastAPI to AWS Lambda

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Install Dependencies
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install zappa

      - name: Backend startup check
        run: |
          cd backend
          source venv/bin/activate
          python -c "from app.main import create_app; app = create_app(); print(app.title)"

      - name: Run backend tests
        run: |
          cd backend
          source venv/bin/activate
          pytest -q

      - name: Run Alembic Migrations
        run: |
          cd backend
          source venv/bin/activate
          DATABASE_URL="${{ secrets.DATABASE_URL }}" alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Lambda
        run: |
          cd backend
          source venv/bin/activate
          zappa deploy production || zappa update production
