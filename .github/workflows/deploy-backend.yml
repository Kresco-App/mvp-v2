name: Deploy Backend to Cloud Run

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: string
      run_migrations:
        description: "Ensure Cloud SQL is running, then run Alembic job"
        required: false
        default: true
        type: boolean
      backend_image:
        description: "Existing backend image reference to deploy instead of building from source"
        required: false
        default: ""
        type: string
      release_sha:
        description: "Release SHA exposed by Cloud Run; defaults to this workflow ref"
        required: false
        default: ""
        type: string
      confirm_production_dark_deploy:
        description: "Required for production: confirms this is dark production only and no domains/traffic are cut over"
        required: false
        default: false
        type: boolean
      enforce_production_launch_gate:
        description: "Set true only for full production cutover after provider rotation evidence is complete"
        required: false
        default: false
        type: boolean
    outputs:
      backend_url:
        description: "Deployed backend Cloud Run URL"
        value: ${{ jobs.deploy.outputs.backend_url }}
      backend_service_url:
        description: "Base Cloud Run service URL before any dark-deploy tag selection"
        value: ${{ jobs.deploy.outputs.backend_service_url }}
      backend_image:
        description: "Pushed backend image reference"
        value: ${{ jobs.deploy.outputs.backend_image }}
      backend_image_digest:
        description: "Backend image digest when Artifact Registry returns one"
        value: ${{ jobs.deploy.outputs.backend_image_digest }}
      backend_revision:
        description: "Latest ready backend Cloud Run revision"
        value: ${{ jobs.deploy.outputs.backend_revision }}
      short_sha:
        description: "Short commit SHA deployed"
        value: ${{ jobs.deploy.outputs.short_sha }}
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      run_migrations:
        description: "Ensure Cloud SQL is running, then run Alembic job"
        required: true
        default: true
        type: boolean
      backend_image:
        description: "Optional existing backend image reference to deploy instead of building from source"
        required: false
        default: ""
        type: string
      release_sha:
        description: "Optional release SHA exposed by Cloud Run; defaults to this workflow ref"
        required: false
        default: ""
        type: string
      confirm_production_dark_deploy:
        description: "Required for production: confirms this is dark production only and no domains/traffic are cut over"
        required: true
        default: false
        type: boolean
      enforce_production_launch_gate:
        description: "Set true only for full production cutover after provider rotation evidence is complete"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'production' && 'Production' || 'staging' }}
    outputs:
      backend_url: ${{ steps.backend_outputs.outputs.backend_url }}
      backend_service_url: ${{ steps.backend_outputs.outputs.backend_service_url }}
      backend_image: ${{ steps.backend_outputs.outputs.backend_image }}
      backend_image_digest: ${{ steps.backend_outputs.outputs.backend_image_digest }}
      backend_revision: ${{ steps.backend_outputs.outputs.backend_revision }}
      short_sha: ${{ steps.backend_outputs.outputs.short_sha }}
    env:
      REGION: europe-southwest1
      SHORT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve target
        env:
          REQUESTED_RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          short_sha="$REQUESTED_RELEASE_SHA"
          if [ -z "$short_sha" ]; then
            short_sha="${GITHUB_SHA::8}"
          fi
          if ! [[ "$short_sha" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
            echo "::error::release_sha must be a 7 to 40 character hexadecimal Git SHA."
            exit 1
          fi
          echo "SHORT_SHA=$short_sha" >> "$GITHUB_ENV"
          case "${{ inputs.environment }}" in
            staging)
              echo "PROJECT_ID=kresco-staging" >> "$GITHUB_ENV"
              echo "KRESCO_ENV=staging" >> "$GITHUB_ENV"
              echo "BACKEND_SERVICE=kresco-backend-staging" >> "$GITHUB_ENV"
              echo "MIGRATION_JOB=kresco-migrate-staging" >> "$GITHUB_ENV"
              echo "CLOUD_SQL_INSTANCE=kresco-staging-postgres" >> "$GITHUB_ENV"
              ;;
            production)
              if [ "${{ inputs.confirm_production_dark_deploy }}" != "true" ]; then
                echo "::error::Production deploys are dark-production only and require confirm_production_dark_deploy=true."
                exit 1
              fi
              echo "PROJECT_ID=kresco-prod" >> "$GITHUB_ENV"
              echo "KRESCO_ENV=prod" >> "$GITHUB_ENV"
              echo "BACKEND_SERVICE=kresco-backend-prod" >> "$GITHUB_ENV"
              echo "MIGRATION_JOB=kresco-migrate-prod" >> "$GITHUB_ENV"
              echo "CLOUD_SQL_INSTANCE=kresco-prod-postgres" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Check repository hygiene
        run: python scripts/check_repo_hygiene.py

      - name: Check secret hygiene
        run: python scripts/check_secret_hygiene.py

      - name: Assert dark production boundary
        if: ${{ inputs.environment == 'production' && inputs.enforce_production_launch_gate == false }}
        run: |
          echo "Dark production deploy only: this workflow does not route domains or user traffic."
          echo "Provider rotation evidence and production launch gate remain required before cutover."

      - name: Enforce production secret rotation checklist
        if: ${{ inputs.environment == 'production' && inputs.enforce_production_launch_gate == true }}
        run: python scripts/check_secret_hygiene.py --require-rotation-checklist

      - name: Enforce production launch gate
        if: ${{ inputs.environment == 'production' && inputs.enforce_production_launch_gate == true }}
        run: python scripts/check_production_launch_gate.py

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        if: ${{ inputs.backend_image == '' }}
        uses: docker/setup-buildx-action@v3

      - name: Update runtime release secret
        run: |
          set -euo pipefail
          runtime_json="$(mktemp)"
          gcloud secrets versions access latest \
            --project "$PROJECT_ID" \
            --secret kresco-runtime \
            | jq \
              --arg sha "$SHORT_SHA" \
              --arg sentry_dsn "${{ vars.NEXT_PUBLIC_SENTRY_DSN }}" \
              '.KRESCO_RELEASE_SHA=$sha | .SENTRY_DSN=$sentry_dsn' > "$runtime_json"
          gcloud secrets versions add kresco-runtime \
            --project "$PROJECT_ID" \
            --data-file "$runtime_json"
          rm -f "$runtime_json"

      - name: Validate runtime domain contract
        run: |
          set -euo pipefail
          case "$KRESCO_ENV" in
            staging)
              frontend_apex_url="https://staging.kresco.ma"
              api_host="api.staging.kresco.ma"
              ;;
            prod)
              frontend_apex_url="https://kresco.ma"
              api_host="api.kresco.ma"
              ;;
            *)
              echo "::error::Unsupported KRESCO_ENV=$KRESCO_ENV"
              exit 1
              ;;
          esac
          python scripts/check_public_auth_readiness.py \
            --project-id "$PROJECT_ID" \
            --runtime-secret-name kresco-runtime \
            --frontend-apex-url "$frontend_apex_url" \
            --api-host "$api_host" \
            --runtime-secret-only

      - name: Resolve supplied backend image
        if: ${{ inputs.backend_image != '' }}
        env:
          SUPPLIED_BACKEND_IMAGE: ${{ inputs.backend_image }}
        run: |
          set -euo pipefail
          expected_prefix="$REGION-docker.pkg.dev/$PROJECT_ID/kresco-containers/kresco-backend"
          case "$SUPPLIED_BACKEND_IMAGE" in
            "$expected_prefix:"*|"$expected_prefix@"*) ;;
            *)
              echo "::error::Supplied backend image must be under $expected_prefix."
              exit 1
              ;;
          esac
          echo "BACKEND_IMAGE=$SUPPLIED_BACKEND_IMAGE" >> "$GITHUB_ENV"
          if [[ "$SUPPLIED_BACKEND_IMAGE" == *@sha256:* ]]; then
            digest="${SUPPLIED_BACKEND_IMAGE##*@}"
          else
            digest="$(gcloud artifacts docker images describe "$SUPPLIED_BACKEND_IMAGE" --project "$PROJECT_ID" --format='value(image_summary.digest)' 2>/dev/null || true)"
          fi
          if [ -z "$digest" ]; then
            echo "::error::Could not resolve digest for supplied backend image $SUPPLIED_BACKEND_IMAGE."
            exit 1
          fi
          echo "BACKEND_IMAGE_DIGEST=$digest" >> "$GITHUB_ENV"

      - name: Build backend image
        if: ${{ inputs.backend_image == '' }}
        run: |
          set -euo pipefail
          image="$REGION-docker.pkg.dev/$PROJECT_ID/kresco-containers/kresco-backend:$SHORT_SHA"
          cache_ref="$REGION-docker.pkg.dev/$PROJECT_ID/kresco-containers/kresco-backend:buildcache"
          echo "BACKEND_IMAGE=$image" >> "$GITHUB_ENV"
          gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet
          docker buildx build --pull \
            --cache-from "type=registry,ref=$cache_ref" \
            --cache-to "type=registry,ref=$cache_ref,mode=max" \
            -t "$image" \
            --push \
            backend
          digest="$(gcloud artifacts docker images describe "$image" --project "$PROJECT_ID" --format='value(image_summary.digest)' 2>/dev/null || true)"
          echo "BACKEND_IMAGE_DIGEST=$digest" >> "$GITHUB_ENV"

      - name: Deploy backend service
        run: |
          set -euo pipefail
          cloud_sql_connection="$PROJECT_ID:$REGION:$CLOUD_SQL_INSTANCE"
          deploy_flags=()
          backend_min_instances=0
          if [ "$KRESCO_ENV" = "prod" ] && [ "${{ inputs.enforce_production_launch_gate }}" != "true" ]; then
            deploy_flags+=(--no-traffic --tag "dark-$SHORT_SHA")
          fi
          if [ "$KRESCO_ENV" = "prod" ] && [ "${{ inputs.enforce_production_launch_gate }}" = "true" ]; then
            backend_min_instances=1
          fi
          gcloud run deploy "$BACKEND_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$BACKEND_IMAGE" \
            --min-instances "$backend_min_instances" \
            --max-instances 3 \
            --set-cloudsql-instances "$cloud_sql_connection" \
            --update-env-vars "KRESCO_ENV=$KRESCO_ENV,KRESCO_RELEASE_SHA=$SHORT_SHA,KRESCO_GCP_RUNTIME_SECRET_NAME=projects/$PROJECT_ID/secrets/kresco-runtime/versions/latest" \
            "${deploy_flags[@]}" \
            --quiet
          gcloud run jobs deploy "$MIGRATION_JOB" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$BACKEND_IMAGE" \
            --command python \
            --args scripts/run_alembic_from_settings.py \
            --set-cloudsql-instances "$cloud_sql_connection" \
            --update-env-vars "KRESCO_ENV=$KRESCO_ENV,KRESCO_RELEASE_SHA=$SHORT_SHA,KRESCO_GCP_RUNTIME_SECRET_NAME=projects/$PROJECT_ID/secrets/kresco-runtime/versions/latest" \
            --quiet

      - name: Resolve backend verification URL
        run: |
          set -euo pipefail
          service_json="$(mktemp)"
          gcloud run services describe "$BACKEND_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format=json > "$service_json"
          service_url="$(jq -r '.status.url // empty' "$service_json")"
          verify_url="$service_url"
          if [ "$KRESCO_ENV" = "prod" ] && [ "${{ inputs.enforce_production_launch_gate }}" != "true" ]; then
            tag="dark-$SHORT_SHA"
            verify_url="$(jq -r --arg tag "$tag" '.status.traffic[]? | select(.tag == $tag) | .url // empty' "$service_json" | head -n 1)"
            if [ -z "$verify_url" ]; then
              echo "::error::Could not find Cloud Run URL for dark production tag $tag."
              cat "$service_json"
              exit 1
            fi
          fi
          if [ -z "$service_url" ] || [ -z "$verify_url" ]; then
            echo "::error::Cloud Run backend service URL could not be resolved."
            cat "$service_json"
            exit 1
          fi
          echo "BACKEND_SERVICE_URL=$service_url" >> "$GITHUB_ENV"
          echo "BACKEND_VERIFY_URL=$verify_url" >> "$GITHUB_ENV"
          rm -f "$service_json"

      - name: Run migrations
        if: ${{ inputs.run_migrations == true }}
        run: |
          set -euo pipefail
          gcloud sql instances patch "$CLOUD_SQL_INSTANCE" \
            --project "$PROJECT_ID" \
            --activation-policy ALWAYS \
            --quiet
          for attempt in {1..90}; do
            state="$(gcloud sql instances describe "$CLOUD_SQL_INSTANCE" --project "$PROJECT_ID" --format='value(state)')"
            if [ "$state" = "RUNNABLE" ]; then
              break
            fi
            echo "Waiting for Cloud SQL instance $CLOUD_SQL_INSTANCE to become RUNNABLE; current state=$state"
            sleep 10
          done
          if [ "$state" != "RUNNABLE" ]; then
            echo "::error::Cloud SQL instance $CLOUD_SQL_INSTANCE did not become RUNNABLE within 15 minutes."
            exit 1
          fi
          gcloud run jobs execute "$MIGRATION_JOB" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --wait \
            --quiet
          export BACKEND_URL="$BACKEND_VERIFY_URL"
          python - <<'PY'
          import json
          import os
          import urllib.request

          base_url = os.environ["BACKEND_URL"].rstrip("/")
          ready_url = base_url + "/ready"
          with urllib.request.urlopen(ready_url, timeout=30) as response:
              ready = json.loads(response.read().decode("utf-8"))
          if ready.get("status") != "ready":
              raise SystemExit(f"Backend readiness failed for {ready_url}: {ready}")
          print(f"Backend readiness passed for {base_url}")
          PY

      - name: Verify backend release health
        id: backend_outputs
        run: |
          set -euo pipefail
          revision="$(gcloud run services describe "$BACKEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.latestReadyRevisionName)')"
          export BACKEND_URL="$BACKEND_VERIFY_URL"
          python - <<'PY'
          import json
          import os
          import urllib.request

          base_url = os.environ["BACKEND_URL"].rstrip("/")
          health_url = base_url + "/health"
          with urllib.request.urlopen(health_url, timeout=30) as response:
              body = json.loads(response.read().decode("utf-8"))
          if body.get("release_sha") != os.environ["SHORT_SHA"]:
              raise SystemExit(f"Release mismatch: {body.get('release_sha')} != {os.environ['SHORT_SHA']}")
          print(f"Backend release health passed for {base_url}")
          PY
          echo "backend_url=$BACKEND_VERIFY_URL" >> "$GITHUB_OUTPUT"
          echo "backend_service_url=$BACKEND_SERVICE_URL" >> "$GITHUB_OUTPUT"
          echo "backend_image=$BACKEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "backend_image_digest=$BACKEND_IMAGE_DIGEST" >> "$GITHUB_OUTPUT"
          echo "backend_revision=$revision" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
