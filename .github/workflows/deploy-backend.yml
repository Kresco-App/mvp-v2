# Deploy FastAPI to AWS Lambda
name: Deploy FastAPI to AWS Lambda

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Zappa settings
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          required = [
            "ZAPPA_S3_BUCKET",
            "DATABASE_URL",
            "JWT_SECRET_KEY",
            "JWT_ALGORITHM",
            "JWT_EXPIRE_MINUTES",
          ]
          missing = [key for key in required if not os.environ.get(key)]
          if missing:
            raise SystemExit(
              "Missing required secrets: " + ", ".join(missing)
            )

          settings = {
              "production": {
                  "app_function": "app_handler.application",
                  "project_name": "kresco",
                  "runtime": "python3.11",
                  "s3_bucket": os.environ.get("ZAPPA_S3_BUCKET"),
                  "aws_region": "eu-north-1",
                  "environment_variables": {
                      "DATABASE_URL": os.environ.get("DATABASE_URL", ""),
                      "JWT_SECRET_KEY": os.environ.get("JWT_SECRET_KEY", ""),
                      "JWT_ALGORITHM": os.environ.get("JWT_ALGORITHM", ""),
                      "JWT_EXPIRE_MINUTES": os.environ.get("JWT_EXPIRE_MINUTES", ""),
                      "DEBUG": os.environ.get("DEBUG") or "false",
                      "GOOGLE_CLIENT_ID": os.environ.get("GOOGLE_CLIENT_ID", ""),
                      "VDOCIPHER_API_SECRET": os.environ.get("VDOCIPHER_API_SECRET", ""),
                      "CORS_ALLOWED_ORIGINS": os.environ.get("CORS_ALLOWED_ORIGINS", ""),
                      "FRONTEND_URL": os.environ.get("FRONTEND_URL", ""),
                      "STRIPE_PK": os.environ.get("STRIPE_PK", ""),
                      "STRIPE_SK": os.environ.get("STRIPE_SK", ""),
                      "STRIPE_PRODUCT_ID": os.environ.get("STRIPE_PRODUCT_ID", ""),
                      "STRIPE_WEBHOOK_SECRET": os.environ.get("STRIPE_WEBHOOK_SECRET", ""),
                      "ADMIN_PASSWORD": os.environ.get("ADMIN_PASSWORD", ""),
                      "RESEND_API_KEY": os.environ.get("RESEND_API_KEY", ""),
                      "RESEND_FROM_EMAIL": os.environ.get("RESEND_FROM_EMAIL", ""),
                  },
                  "cors": True,
                  "timeout_seconds": 30,
                  "memory_size": 512,
                  "manage_roles": True,
                  "apigateway_enabled": True,
                  "slim_handler": True,
                  "keep_warm": False,
              }
          }

          Path("backend/zappa_settings.json").write_text(
              json.dumps(settings, indent=4) + "\n"
          )
          PY
        env:
          ZAPPA_S3_BUCKET: ${{ secrets.ZAPPA_S3_BUCKET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ALGORITHM: ${{ secrets.JWT_ALGORITHM }}
          JWT_EXPIRE_MINUTES: ${{ secrets.JWT_EXPIRE_MINUTES }}
          DEBUG: ${{ secrets.DEBUG }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VDOCIPHER_API_SECRET: ${{ secrets.VDOCIPHER_API_SECRET }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          STRIPE_PK: ${{ secrets.STRIPE_PK }}
          STRIPE_SK: ${{ secrets.STRIPE_SK }}
          STRIPE_PRODUCT_ID: ${{ secrets.STRIPE_PRODUCT_ID }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Install Dependencies
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install zappa

      - name: Run Alembic Migrations
        run: |
          cd backend
          source venv/bin/activate
          DATABASE_URL="${{ secrets.DATABASE_URL }}" alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Lambda
        run: |
          cd backend
          source venv/bin/activate
          zappa deploy production || zappa update production
