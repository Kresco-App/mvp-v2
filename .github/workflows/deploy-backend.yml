name: Deploy Backend to Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      run_migrations:
        description: "Start Cloud SQL, run Alembic job, then stop Cloud SQL again"
        required: true
        default: true
        type: boolean
      confirm_production_dark_deploy:
        description: "Required for production: confirms this is dark production only and no domains/traffic are cut over"
        required: true
        default: false
        type: boolean
      enforce_production_launch_gate:
        description: "Set true only for full production cutover after provider rotation evidence is complete"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'production' && 'Production' || 'staging' }}
    env:
      REGION: europe-southwest1
      SHORT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve target
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::8}"
          echo "SHORT_SHA=$short_sha" >> "$GITHUB_ENV"
          case "${{ inputs.environment }}" in
            staging)
              echo "PROJECT_ID=kresco-staging" >> "$GITHUB_ENV"
              echo "KRESCO_ENV=staging" >> "$GITHUB_ENV"
              echo "BACKEND_SERVICE=kresco-backend-staging" >> "$GITHUB_ENV"
              echo "MIGRATION_JOB=kresco-migrate-staging" >> "$GITHUB_ENV"
              echo "CLOUD_SQL_INSTANCE=kresco-staging-postgres" >> "$GITHUB_ENV"
              ;;
            production)
              if [ "${{ inputs.confirm_production_dark_deploy }}" != "true" ]; then
                echo "::error::Production deploys are dark-production only and require confirm_production_dark_deploy=true."
                exit 1
              fi
              echo "PROJECT_ID=kresco-prod" >> "$GITHUB_ENV"
              echo "KRESCO_ENV=prod" >> "$GITHUB_ENV"
              echo "BACKEND_SERVICE=kresco-backend-prod" >> "$GITHUB_ENV"
              echo "MIGRATION_JOB=kresco-migrate-prod" >> "$GITHUB_ENV"
              echo "CLOUD_SQL_INSTANCE=kresco-prod-postgres" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Check repository hygiene
        run: python scripts/check_repo_hygiene.py

      - name: Check secret hygiene
        run: python scripts/check_secret_hygiene.py

      - name: Assert dark production boundary
        if: ${{ inputs.environment == 'production' && inputs.enforce_production_launch_gate == false }}
        run: |
          echo "Dark production deploy only: this workflow does not route domains or user traffic."
          echo "Provider rotation evidence and production launch gate remain required before cutover."

      - name: Enforce production secret rotation checklist
        if: ${{ inputs.environment == 'production' && inputs.enforce_production_launch_gate == true }}
        run: python scripts/check_secret_hygiene.py --require-rotation-checklist

      - name: Enforce production launch gate
        if: ${{ inputs.environment == 'production' && inputs.enforce_production_launch_gate == true }}
        run: python scripts/check_production_launch_gate.py

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Update runtime release secret
        run: |
          set -euo pipefail
          runtime_json="$(mktemp)"
          gcloud secrets versions access latest \
            --project "$PROJECT_ID" \
            --secret kresco-runtime \
            | jq --arg sha "$SHORT_SHA" '.KRESCO_RELEASE_SHA=$sha' > "$runtime_json"
          gcloud secrets versions add kresco-runtime \
            --project "$PROJECT_ID" \
            --data-file "$runtime_json"
          rm -f "$runtime_json"

      - name: Build backend image
        run: |
          set -euo pipefail
          image="$REGION-docker.pkg.dev/$PROJECT_ID/kresco-containers/kresco-backend:$SHORT_SHA"
          echo "BACKEND_IMAGE=$image" >> "$GITHUB_ENV"
          gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet
          docker build --pull -t "$image" backend
          docker push "$image"

      - name: Deploy backend service
        run: |
          set -euo pipefail
          cloud_sql_connection="$PROJECT_ID:$REGION:$CLOUD_SQL_INSTANCE"
          gcloud run deploy "$BACKEND_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$BACKEND_IMAGE" \
            --min-instances 0 \
            --max-instances 3 \
            --set-cloudsql-instances "$cloud_sql_connection" \
            --update-env-vars "KRESCO_ENV=$KRESCO_ENV,KRESCO_RELEASE_SHA=$SHORT_SHA,KRESCO_GCP_RUNTIME_SECRET_NAME=projects/$PROJECT_ID/secrets/kresco-runtime/versions/latest" \
            --quiet
          gcloud run jobs deploy "$MIGRATION_JOB" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$BACKEND_IMAGE" \
            --command python \
            --args scripts/run_alembic_from_settings.py \
            --set-cloudsql-instances "$cloud_sql_connection" \
            --update-env-vars "KRESCO_ENV=$KRESCO_ENV,KRESCO_RELEASE_SHA=$SHORT_SHA,KRESCO_GCP_RUNTIME_SECRET_NAME=projects/$PROJECT_ID/secrets/kresco-runtime/versions/latest" \
            --quiet

      - name: Run migrations with stopped-db cleanup
        if: ${{ inputs.run_migrations == true }}
        run: |
          set -euo pipefail
          cleanup() {
            gcloud sql instances patch "$CLOUD_SQL_INSTANCE" \
              --project "$PROJECT_ID" \
              --activation-policy NEVER \
              --quiet || true
          }
          trap cleanup EXIT
          gcloud sql instances patch "$CLOUD_SQL_INSTANCE" \
            --project "$PROJECT_ID" \
            --activation-policy ALWAYS \
            --quiet
          for attempt in {1..90}; do
            state="$(gcloud sql instances describe "$CLOUD_SQL_INSTANCE" --project "$PROJECT_ID" --format='value(state)')"
            if [ "$state" = "RUNNABLE" ]; then
              break
            fi
            echo "Waiting for Cloud SQL instance $CLOUD_SQL_INSTANCE to become RUNNABLE; current state=$state"
            sleep 10
          done
          if [ "$state" != "RUNNABLE" ]; then
            echo "::error::Cloud SQL instance $CLOUD_SQL_INSTANCE did not become RUNNABLE within 15 minutes."
            exit 1
          fi
          gcloud run jobs execute "$MIGRATION_JOB" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --wait \
            --quiet
          url="$(gcloud run services describe "$BACKEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          export BACKEND_URL="$url"
          python - <<'PY'
          import json
          import os
          import urllib.request

          base_url = os.environ["BACKEND_URL"].rstrip("/")
          ready_url = base_url + "/ready"
          with urllib.request.urlopen(ready_url, timeout=30) as response:
              ready = json.loads(response.read().decode("utf-8"))
          if ready.get("status") != "ready":
              raise SystemExit(f"Backend readiness failed for {ready_url}: {ready}")
          print(f"Backend readiness passed for {base_url}")
          PY

      - name: Verify backend release health
        run: |
          set -euo pipefail
          url="$(gcloud run services describe "$BACKEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          export BACKEND_URL="$url"
          python - <<'PY'
          import json
          import os
          import urllib.request

          base_url = os.environ["BACKEND_URL"].rstrip("/")
          health_url = base_url + "/health"
          with urllib.request.urlopen(health_url, timeout=30) as response:
              body = json.loads(response.read().decode("utf-8"))
          if body.get("release_sha") != os.environ["SHORT_SHA"]:
              raise SystemExit(f"Release mismatch: {body.get('release_sha')} != {os.environ['SHORT_SHA']}")
          print(f"Backend release health passed for {base_url}")
          PY
