name: Staging Realtime Fanout Evidence

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    environment: staging
    env:
      PROJECT_ID: kresco-staging
      EVIDENCE_DIR: artifacts/staging-realtime-fanout
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Prepare evidence directory
        run: mkdir -p "$EVIDENCE_DIR"

      - name: Install Firestore client
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-cloud-firestore==2.27.0

      - name: Collect Firestore realtime delivery evidence
        run: |
          set -euo pipefail
          normalize_secret_value() {
            case "$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')" in
              ""|"null"|"undefined"|"none") printf '' ;;
              *) printf '%s' "$1" ;;
            esac
          }
          runtime_json="$(mktemp)"
          gcloud secrets versions access latest \
            --project "$PROJECT_ID" \
            --secret kresco-runtime > "$runtime_json"
          firebase_project_id="$(normalize_secret_value "$(jq -r '.FIREBASE_PROJECT_ID // .firebase_project_id // empty' "$runtime_json")")"
          firestore_database="$(normalize_secret_value "$(jq -r '.FIRESTORE_DATABASE // .firestore_database // "(default)"' "$runtime_json")")"
          rm -f "$runtime_json"
          if [ -z "$firebase_project_id" ]; then
            firebase_project_id="$PROJECT_ID"
          fi
          if [ -z "$firestore_database" ]; then
            firestore_database="(default)"
          fi
          python scripts/run_evidence_command.py \
            --name staging-realtime-fanout \
            --output "$EVIDENCE_DIR/firestore-delivery.json" \
            --require-json \
            -- \
            python scripts/check_firestore_realtime_delivery.py \
              --project-id "$firebase_project_id" \
              --database "$firestore_database" \
              --json

      - name: Upload staging realtime fanout evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-realtime-fanout
          path: artifacts/staging-realtime-fanout
          if-no-files-found: error
