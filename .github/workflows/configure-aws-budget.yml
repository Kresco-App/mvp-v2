name: Configure AWS Budget Alerts

on:
  workflow_dispatch:
    inputs:
      monthly_limit_usd:
        description: "Monthly AWS budget limit in USD"
        required: true
        default: "100"
        type: string
      notification_email:
        description: "Email address that should receive AWS budget alerts"
        required: true
        type: string

jobs:
  budget:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Create or update monthly budget alerts
        env:
          MONTHLY_LIMIT_USD: ${{ inputs.monthly_limit_usd }}
          NOTIFICATION_EMAIL: ${{ inputs.notification_email }}
        run: |
          set -euo pipefail
          python -m pip install --quiet boto3
          python - <<'PY'
          from __future__ import annotations

          from decimal import Decimal
          import os

          import boto3
          from botocore.exceptions import ClientError

          account_id = boto3.client("sts").get_caller_identity()["Account"]
          budgets = boto3.client("budgets", region_name="us-east-1")
          budget_name = "kresco-monthly-total-cost"
          limit = str(Decimal(os.environ["MONTHLY_LIMIT_USD"]))
          email = os.environ["NOTIFICATION_EMAIL"].strip()

          budget = {
              "BudgetName": budget_name,
              "BudgetLimit": {"Amount": limit, "Unit": "USD"},
              "CostFilters": {},
              "CostTypes": {
                  "IncludeTax": True,
                  "IncludeSubscription": True,
                  "UseBlended": False,
                  "IncludeRefund": False,
                  "IncludeCredit": False,
                  "IncludeUpfront": True,
                  "IncludeRecurring": True,
                  "IncludeOtherSubscription": True,
                  "IncludeSupport": True,
                  "IncludeDiscount": True,
                  "UseAmortized": False,
              },
              "TimeUnit": "MONTHLY",
              "BudgetType": "COST",
          }
          notifications = [
              ("ACTUAL", Decimal("50")),
              ("ACTUAL", Decimal("80")),
              ("ACTUAL", Decimal("100")),
              ("FORECASTED", Decimal("100")),
          ]

          try:
              budgets.delete_budget(AccountId=account_id, BudgetName=budget_name)
          except ClientError as exc:
              if exc.response["Error"]["Code"] != "NotFoundException":
                  raise

          budgets.create_budget(
              AccountId=account_id,
              Budget=budget,
              NotificationsWithSubscribers=[
                  {
                      "Notification": {
                          "NotificationType": notification_type,
                          "ComparisonOperator": "GREATER_THAN",
                          "Threshold": float(threshold),
                          "ThresholdType": "PERCENTAGE",
                      },
                      "Subscribers": [{"SubscriptionType": "EMAIL", "Address": email}],
                  }
                  for notification_type, threshold in notifications
              ],
          )
          print(f"Configured {budget_name} at ${limit}/month with alerts to {email}.")
          PY
