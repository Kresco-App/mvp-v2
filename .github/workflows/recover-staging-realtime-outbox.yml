name: Recover Staging Realtime Outbox

on:
  workflow_dispatch:
    inputs:
      requeue_limit:
        description: "Maximum failed outbox rows to requeue"
        required: true
        default: "500"
        type: string
      process_limit:
        description: "Maximum outbox rows to process after requeue"
        required: true
        default: "500"
        type: string

jobs:
  recover:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Requeue and drain staging realtime outbox
        env:
          BACKEND_READY_URL: ${{ vars.BACKEND_READY_URL }}
          KRESCO_INTERNAL_SECRET: ${{ secrets.REALTIME_OUTBOX_SECRET }}
          REQUEUE_LIMIT: ${{ inputs.requeue_limit }}
          PROCESS_LIMIT: ${{ inputs.process_limit }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.request

          ready_url = os.environ["BACKEND_READY_URL"].rstrip("/")
          base_url = ready_url[:-len("/ready")] if ready_url.endswith("/ready") else ready_url
          headers = {
              "Accept": "application/json",
              "x-kresco-internal-secret": os.environ["KRESCO_INTERNAL_SECRET"],
          }

          def post(path):
              request = urllib.request.Request(f"{base_url}{path}", headers=headers, method="POST")
              with urllib.request.urlopen(request, timeout=60) as response:
                  return json.loads(response.read().decode("utf-8"))

          requeue = post(f"/api/internal/realtime/requeue-failed-outbox?limit={os.environ['REQUEUE_LIMIT']}")
          drain = post(f"/api/internal/realtime/process-outbox?limit={os.environ['PROCESS_LIMIT']}")
          print(json.dumps({"requeue": requeue, "drain": drain}, indent=2, sort_keys=True))
          PY
