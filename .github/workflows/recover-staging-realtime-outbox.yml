name: Recover Staging Realtime Outbox

on:
  workflow_dispatch:
    inputs:
      requeue_limit:
        description: "Maximum failed outbox rows to requeue"
        required: true
        default: "500"
        type: string
      process_limit:
        description: "Maximum outbox rows to process after requeue"
        required: true
        default: "500"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  recover:
    runs-on: ubuntu-latest
    environment: staging
    env:
      PROJECT_ID: kresco-staging
      REGION: europe-southwest1
      BACKEND_SERVICE: kresco-backend-staging
      CLOUD_SQL_INSTANCE: kresco-staging-postgres
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Requeue and drain staging realtime outbox
        env:
          REQUEUE_LIMIT: ${{ inputs.requeue_limit }}
          PROCESS_LIMIT: ${{ inputs.process_limit }}
        run: |
          set -euo pipefail
          cleanup() {
            gcloud sql instances patch "$CLOUD_SQL_INSTANCE" \
              --project "$PROJECT_ID" \
              --activation-policy NEVER \
              --quiet || true
          }
          trap cleanup EXIT
          gcloud sql instances patch "$CLOUD_SQL_INSTANCE" \
            --project "$PROJECT_ID" \
            --activation-policy ALWAYS \
            --quiet
          for attempt in {1..90}; do
            state="$(gcloud sql instances describe "$CLOUD_SQL_INSTANCE" --project "$PROJECT_ID" --format='value(state)')"
            if [ "$state" = "RUNNABLE" ]; then
              break
            fi
            echo "Waiting for Cloud SQL instance $CLOUD_SQL_INSTANCE to become RUNNABLE; current state=$state"
            sleep 10
          done
          if [ "$state" != "RUNNABLE" ]; then
            echo "::error::Cloud SQL instance $CLOUD_SQL_INSTANCE did not become RUNNABLE within 15 minutes."
            exit 1
          fi
          runtime_json="$(mktemp)"
          gcloud secrets versions access latest --project "$PROJECT_ID" --secret kresco-runtime > "$runtime_json"
          internal_secret="$(jq -r '.REALTIME_OUTBOX_SECRET // .realtime_outbox_secret // empty' "$runtime_json")"
          rm -f "$runtime_json"
          if [ -z "$internal_secret" ]; then
            echo "::error::REALTIME_OUTBOX_SECRET is missing from kresco-runtime."
            exit 1
          fi
          backend_url="$(gcloud run services describe "$BACKEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          export BACKEND_URL="$backend_url"
          internal_secret="$internal_secret" python - <<'PY'
          import json
          import os
          import urllib.request

          base_url = os.environ["BACKEND_URL"].rstrip("/")
          headers = {
              "Accept": "application/json",
              "x-kresco-internal-secret": os.environ["internal_secret"],
          }

          def post(path):
              request = urllib.request.Request(f"{base_url}{path}", headers=headers, method="POST")
              with urllib.request.urlopen(request, timeout=60) as response:
                  return json.loads(response.read().decode("utf-8"))

          requeue = post(f"/api/internal/realtime/requeue-failed-outbox?limit={os.environ['REQUEUE_LIMIT']}")
          drain = post(f"/api/internal/realtime/process-outbox?limit={os.environ['PROCESS_LIMIT']}")
          print(json.dumps({"requeue": requeue, "drain": drain}, indent=2, sort_keys=True))
          PY
