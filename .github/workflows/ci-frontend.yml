name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - "scripts/**"
      - ".gitignore"
      - ".github/workflows/ci-frontend.yml"
  push:
    branches:
      - master
      - "codex/**"
    paths:
      - "frontend/**"
      - "backend/**"
      - "scripts/**"
      - ".gitignore"
      - ".github/workflows/ci-frontend.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: "/api/"
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Check repository hygiene
        working-directory: .
        run: python scripts/check_repo_hygiene.py

      - name: Check secret hygiene
        working-directory: .
        run: python scripts/check_secret_hygiene.py

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/app/**', 'frontend/components/**', 'frontend/lib/**', 'frontend/next.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Install backend dependencies for integration tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Playwright Chromium cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run lint
        run: npm run lint

      - name: Audit CSP inline style policy
        run: npm run audit:csp-styles

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

      - name: Run browser smoke tests
        run: npm run test:e2e

      - name: Run real browser integration test
        run: npm run test:e2e:integration
