name: Staging Provider Diagnostics

on:
  workflow_dispatch:

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run non-Stripe staging diagnostics
        env:
          BACKEND_READY_URL: ${{ vars.BACKEND_READY_URL }}
          KRESCO_INTERNAL_SECRET: ${{ secrets.REALTIME_OUTBOX_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${BACKEND_READY_URL:-}" ]; then
            echo "BACKEND_READY_URL is not configured."
            exit 1
          fi
          python scripts/check_staging_runtime.py \
            "$BACKEND_READY_URL" \
            --include-provider-reachability \
            --json
