name: Deploy Frontend to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Frontend environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check repository hygiene
        working-directory: .
        run: python scripts/check_repo_hygiene.py

      - name: Check secret hygiene
        working-directory: .
        run: python scripts/check_secret_hygiene.py

      - name: Enforce production launch gate
        if: ${{ env.DEPLOY_ENVIRONMENT == 'production' }}
        working-directory: .
        run: python scripts/check_production_launch_gate.py

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies for integration tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Build frontend for browser smoke
        run: npm run build

      - name: Run browser smoke tests
        run: npm run test:e2e

      - name: Run real browser integration test
        run: npm run test:e2e:integration

      - name: Install Vercel CLI
        run: npm install --global vercel@54.4.1

      - name: Pull Vercel preview environment
        if: ${{ env.DEPLOY_ENVIRONMENT != 'production' }}
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Pull Vercel production environment
        if: ${{ env.DEPLOY_ENVIRONMENT == 'production' }}
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Validate production environment
        if: ${{ env.DEPLOY_ENVIRONMENT == 'production' }}
        run: npm run validate:production-env

      - name: Build frontend preview
        if: ${{ env.DEPLOY_ENVIRONMENT != 'production' }}
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build frontend production
        if: ${{ env.DEPLOY_ENVIRONMENT == 'production' }}
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt frontend preview
        if: ${{ env.DEPLOY_ENVIRONMENT != 'production' }}
        run: vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt frontend production
        if: ${{ env.DEPLOY_ENVIRONMENT == 'production' }}
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
