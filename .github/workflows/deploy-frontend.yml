name: Deploy Frontend to Cloud Run

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: string
      confirm_production_dark_deploy:
        description: "Required for production: confirms this is dark production only and no domains/traffic are cut over"
        required: false
        default: false
        type: boolean
      enforce_production_launch_gate:
        description: "Set true only for full production cutover after provider rotation evidence is complete"
        required: false
        default: false
        type: boolean
      hsts_include_subdomains:
        description: "Production cutover only: emit HSTS includeSubDomains after every frontend subdomain is verified"
        required: false
        default: false
        type: boolean
    outputs:
      frontend_url:
        description: "Deployed frontend Cloud Run URL"
        value: ${{ jobs.deploy.outputs.frontend_url }}
      frontend_image:
        description: "Pushed frontend image reference"
        value: ${{ jobs.deploy.outputs.frontend_image }}
      frontend_image_digest:
        description: "Frontend image digest when Artifact Registry returns one"
        value: ${{ jobs.deploy.outputs.frontend_image_digest }}
      frontend_revision:
        description: "Latest ready frontend Cloud Run revision"
        value: ${{ jobs.deploy.outputs.frontend_revision }}
      short_sha:
        description: "Short commit SHA deployed"
        value: ${{ jobs.deploy.outputs.short_sha }}
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      confirm_production_dark_deploy:
        description: "Required for production: confirms this is dark production only and no domains/traffic are cut over"
        required: true
        default: false
        type: boolean
      enforce_production_launch_gate:
        description: "Set true only for full production cutover after provider rotation evidence is complete"
        required: true
        default: false
        type: boolean
      hsts_include_subdomains:
        description: "Production cutover only: emit HSTS includeSubDomains after every frontend subdomain is verified"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'production' && 'Production' || 'staging' }}
    outputs:
      frontend_url: ${{ steps.frontend_outputs.outputs.frontend_url }}
      frontend_image: ${{ steps.frontend_outputs.outputs.frontend_image }}
      frontend_image_digest: ${{ steps.frontend_outputs.outputs.frontend_image_digest }}
      frontend_revision: ${{ steps.frontend_outputs.outputs.frontend_revision }}
      short_sha: ${{ steps.frontend_outputs.outputs.short_sha }}
    env:
      REGION: europe-southwest1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve target
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::8}"
          echo "SHORT_SHA=$short_sha" >> "$GITHUB_ENV"
          case "${{ inputs.environment }}" in
            staging)
              if [ "${{ inputs.hsts_include_subdomains }}" = "true" ]; then
                echo "::error::HSTS includeSubDomains is not allowed on staging deploys."
                exit 1
              fi
              echo "PROJECT_ID=kresco-staging" >> "$GITHUB_ENV"
              echo "FRONTEND_SERVICE=kresco-frontend-staging" >> "$GITHUB_ENV"
              echo "BACKEND_SERVICE=kresco-backend-staging" >> "$GITHUB_ENV"
              echo "FRONTEND_PUBLIC_SITE_URL=https://staging.kresco.ma" >> "$GITHUB_ENV"
              echo "FRONTEND_BACKEND_ORIGIN=https://api.staging.kresco.ma" >> "$GITHUB_ENV"
              echo "FRONTEND_AUTH_COOKIE_DOMAIN=staging.kresco.ma" >> "$GITHUB_ENV"
              echo "FRONTEND_HSTS_INCLUDE_SUBDOMAINS=false" >> "$GITHUB_ENV"
              ;;
            production)
              if [ "${{ inputs.confirm_production_dark_deploy }}" != "true" ]; then
                echo "::error::Production deploys are dark-production only and require confirm_production_dark_deploy=true."
                exit 1
              fi
              if [ "${{ inputs.hsts_include_subdomains }}" = "true" ] && [ "${{ inputs.enforce_production_launch_gate }}" != "true" ]; then
                echo "::error::HSTS includeSubDomains requires enforce_production_launch_gate=true after every frontend subdomain is verified."
                exit 1
              fi
              echo "PROJECT_ID=kresco-prod" >> "$GITHUB_ENV"
              echo "FRONTEND_SERVICE=kresco-frontend-prod" >> "$GITHUB_ENV"
              echo "BACKEND_SERVICE=kresco-backend-prod" >> "$GITHUB_ENV"
              echo "FRONTEND_PUBLIC_SITE_URL=https://kresco.ma" >> "$GITHUB_ENV"
              echo "FRONTEND_BACKEND_ORIGIN=https://api.kresco.ma" >> "$GITHUB_ENV"
              echo "FRONTEND_AUTH_COOKIE_DOMAIN=kresco.ma" >> "$GITHUB_ENV"
              echo "FRONTEND_HSTS_INCLUDE_SUBDOMAINS=${{ inputs.hsts_include_subdomains }}" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Check repository hygiene
        run: python scripts/check_repo_hygiene.py

      - name: Check secret hygiene
        run: python scripts/check_secret_hygiene.py

      - name: Assert dark production boundary
        if: ${{ inputs.environment == 'production' && inputs.enforce_production_launch_gate == false }}
        run: |
          echo "Dark production deploy only: this workflow does not route domains or user traffic."
          echo "Provider rotation evidence and production launch gate remain required before cutover."

      - name: Enforce production secret rotation checklist
        if: ${{ inputs.environment == 'production' && inputs.enforce_production_launch_gate == true }}
        run: python scripts/check_secret_hygiene.py --require-rotation-checklist

      - name: Enforce production launch gate
        if: ${{ inputs.environment == 'production' && inputs.enforce_production_launch_gate == true }}
        run: python scripts/check_production_launch_gate.py

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve Firebase build config
        run: |
          set -euo pipefail
          runtime_json="$(mktemp)"
          gcloud secrets versions access latest --project "$PROJECT_ID" --secret kresco-runtime > "$runtime_json"
          firebase_api_key="$(jq -er '.NEXT_PUBLIC_FIREBASE_API_KEY // .FIREBASE_WEB_API_KEY' "$runtime_json")"
          firebase_project_id="$(jq -er '.NEXT_PUBLIC_FIREBASE_PROJECT_ID // .FIREBASE_PROJECT_ID // .firebase_project_id' "$runtime_json")"
          firebase_auth_domain="$(jq -er '.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN // .FIREBASE_AUTH_DOMAIN // .firebase_auth_domain' "$runtime_json")"
          firebase_storage_bucket="$(jq -er '.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET // .FIREBASE_STORAGE_BUCKET // .firebase_storage_bucket' "$runtime_json")"
          firebase_messaging_sender_id="$(jq -er '.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID // .FIREBASE_MESSAGING_SENDER_ID // .firebase_messaging_sender_id' "$runtime_json")"
          firebase_app_id="$(jq -er '.NEXT_PUBLIC_FIREBASE_APP_ID // .FIREBASE_APP_ID // .firebase_app_id' "$runtime_json")"
          firestore_database="$(jq -er '.NEXT_PUBLIC_FIRESTORE_DATABASE // .FIRESTORE_DATABASE // .firestore_database // "(default)"' "$runtime_json")"
          echo "::add-mask::$firebase_api_key"
          {
            echo "NEXT_PUBLIC_FIREBASE_API_KEY=$firebase_api_key"
            echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=$firebase_project_id"
            echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$firebase_auth_domain"
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$firebase_storage_bucket"
            echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$firebase_messaging_sender_id"
            echo "NEXT_PUBLIC_FIREBASE_APP_ID=$firebase_app_id"
            echo "NEXT_PUBLIC_FIRESTORE_DATABASE=$firestore_database"
          } >> "$GITHUB_ENV"
          rm -f "$runtime_json"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate production-shaped frontend env
        working-directory: frontend
        run: |
          set -euo pipefail
          NEXT_PUBLIC_API_BASE_URL=/api \
          KRESCO_BACKEND_ORIGIN="$FRONTEND_BACKEND_ORIGIN" \
          NEXT_PUBLIC_SITE_URL="$FRONTEND_PUBLIC_SITE_URL" \
          NEXT_PUBLIC_AUTH_COOKIE_DOMAIN="$FRONTEND_AUTH_COOKIE_DOMAIN" \
          KRESCO_HSTS_INCLUDE_SUBDOMAINS="$FRONTEND_HSTS_INCLUDE_SUBDOMAINS" \
          NEXT_PUBLIC_REALTIME_PROVIDER=firestore \
          NEXT_PUBLIC_RELEASE_SHA="$SHORT_SHA" \
          npm run validate:production-env

      - name: Build frontend image
        run: |
          set -euo pipefail
          image="$REGION-docker.pkg.dev/$PROJECT_ID/kresco-containers/kresco-frontend:$SHORT_SHA"
          echo "FRONTEND_IMAGE=$image" >> "$GITHUB_ENV"
          gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet
          docker build --pull \
            --build-arg NEXT_PUBLIC_API_BASE_URL=/api \
            --build-arg NEXT_PUBLIC_SITE_URL="$FRONTEND_PUBLIC_SITE_URL" \
            --build-arg NEXT_PUBLIC_AUTH_COOKIE_DOMAIN="$FRONTEND_AUTH_COOKIE_DOMAIN" \
            --build-arg KRESCO_HSTS_INCLUDE_SUBDOMAINS="$FRONTEND_HSTS_INCLUDE_SUBDOMAINS" \
            --build-arg NEXT_PUBLIC_REALTIME_PROVIDER=firestore \
            --build-arg NEXT_PUBLIC_RELEASE_SHA="$SHORT_SHA" \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$NEXT_PUBLIC_FIREBASE_API_KEY" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$NEXT_PUBLIC_FIREBASE_PROJECT_ID" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="$NEXT_PUBLIC_FIREBASE_APP_ID" \
            --build-arg NEXT_PUBLIC_FIRESTORE_DATABASE="$NEXT_PUBLIC_FIRESTORE_DATABASE" \
            --build-arg KRESCO_BACKEND_ORIGIN="$FRONTEND_BACKEND_ORIGIN" \
            -f frontend/Dockerfile \
            -t "$image" \
            frontend
          docker push "$image"
          digest="$(gcloud artifacts docker images describe "$image" --project "$PROJECT_ID" --format='value(image_summary.digest)' 2>/dev/null || true)"
          echo "FRONTEND_IMAGE_DIGEST=$digest" >> "$GITHUB_ENV"

      - name: Deploy frontend service
        run: |
          set -euo pipefail
          runtime_env_vars=(
            "NEXT_PUBLIC_API_BASE_URL=/api"
            "NEXT_PUBLIC_SITE_URL=$FRONTEND_PUBLIC_SITE_URL"
            "NEXT_PUBLIC_AUTH_COOKIE_DOMAIN=$FRONTEND_AUTH_COOKIE_DOMAIN"
            "NEXT_PUBLIC_REALTIME_PROVIDER=firestore"
            "NEXT_PUBLIC_RELEASE_SHA=$SHORT_SHA"
            "NEXT_PUBLIC_FIREBASE_API_KEY=$NEXT_PUBLIC_FIREBASE_API_KEY"
            "NEXT_PUBLIC_FIREBASE_PROJECT_ID=$NEXT_PUBLIC_FIREBASE_PROJECT_ID"
            "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN"
            "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET"
            "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID"
            "NEXT_PUBLIC_FIREBASE_APP_ID=$NEXT_PUBLIC_FIREBASE_APP_ID"
            "NEXT_PUBLIC_FIRESTORE_DATABASE=$NEXT_PUBLIC_FIRESTORE_DATABASE"
            "KRESCO_BACKEND_ORIGIN=$FRONTEND_BACKEND_ORIGIN"
            "KRESCO_HSTS_INCLUDE_SUBDOMAINS=$FRONTEND_HSTS_INCLUDE_SUBDOMAINS"
          )
          runtime_env_csv="$(IFS=,; echo "${runtime_env_vars[*]}")"
          gcloud run deploy "$FRONTEND_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$FRONTEND_IMAGE" \
            --update-env-vars "$runtime_env_csv" \
            --min-instances 0 \
            --max-instances 3 \
            --quiet

      - name: Verify deployed frontend Firebase env
        run: |
          set -euo pipefail
          service_json="$(mktemp)"
          gcloud run services describe "$FRONTEND_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format=json > "$service_json"
          python - "$service_json" <<'PY'
          import json
          import sys

          required = (
              "NEXT_PUBLIC_FIREBASE_API_KEY",
              "NEXT_PUBLIC_FIREBASE_PROJECT_ID",
              "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN",
              "NEXT_PUBLIC_FIREBASE_APP_ID",
          )
          with open(sys.argv[1], encoding="utf-8") as handle:
              service = json.load(handle)
          containers = service.get("spec", {}).get("template", {}).get("spec", {}).get("containers", [])
          env_items = containers[0].get("env", []) if containers else []
          env = {
              item.get("name"): item.get("value", "")
              for item in env_items
              if isinstance(item, dict)
          }
          missing = [key for key in required if not str(env.get(key, "")).strip()]
          if missing:
              raise SystemExit("Deployed frontend Firebase env is empty for: " + ", ".join(missing))
          print("Deployed frontend Firebase env check passed.")
          PY
          rm -f "$service_json"

      - name: Verify frontend surface
        id: frontend_outputs
        run: |
          set -euo pipefail
          url="$(gcloud run services describe "$FRONTEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          revision="$(gcloud run services describe "$FRONTEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.latestReadyRevisionName)')"
          export FRONTEND_URL="$url"
          python - <<'PY'
          import os
          import urllib.request

          url = os.environ["FRONTEND_URL"]
          with urllib.request.urlopen(url, timeout=30) as response:
              status = response.getcode()
              body = response.read(8192).decode("utf-8", errors="replace")
          if status >= 400 or "<html" not in body.lower():
              raise SystemExit(f"Frontend smoke failed for {url}: HTTP {status}")
          if f'data-release="{os.environ["SHORT_SHA"]}"' not in body:
              raise SystemExit("Frontend release marker mismatch.")
          print(f"Frontend smoke passed for {url}")
          PY
          echo "FRONTEND_URL=$url" >> "$GITHUB_ENV"
          echo "frontend_url=$url" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "frontend_image_digest=$FRONTEND_IMAGE_DIGEST" >> "$GITHUB_OUTPUT"
          echo "frontend_revision=$revision" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Scan for production demo surface
        working-directory: frontend
        run: npm run check:production-demo-surface -- --base-url "$FRONTEND_URL" --json
