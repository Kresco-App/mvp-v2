name: Deploy Frontend to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Frontend environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
      NEXT_PUBLIC_RELEASE_SHA: ${{ github.sha }}
      KRESCO_E2E_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kresco_frontend_e2e
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kresco_frontend_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kresco_frontend_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check repository hygiene
        working-directory: .
        run: python scripts/check_repo_hygiene.py

      - name: Check secret hygiene
        working-directory: .
        run: python scripts/check_secret_hygiene.py

      - name: Enforce production secret rotation checklist
        if: ${{ env.DEPLOY_ENVIRONMENT == 'production' }}
        working-directory: .
        run: python scripts/check_secret_hygiene.py --require-rotation-checklist

      - name: Enforce production launch gate
        if: ${{ env.DEPLOY_ENVIRONMENT == 'production' }}
        working-directory: .
        run: python scripts/check_production_launch_gate.py

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies for integration tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Build frontend for browser smoke
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: "/api/"

      - name: Run browser smoke tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_API_BASE_URL: "/api/"

      - name: Run real browser integration test
        run: npm run test:e2e:integration

      - name: Install Vercel CLI
        run: npm install --global vercel@54.4.1

      - name: Pull Vercel preview environment
        if: ${{ env.DEPLOY_ENVIRONMENT != 'production' }}
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Pull Vercel production environment
        if: ${{ env.DEPLOY_ENVIRONMENT == 'production' }}
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Validate production environment
        if: ${{ env.DEPLOY_ENVIRONMENT == 'production' }}
        run: npm run validate:production-env

      - name: Validate staging frontend environment
        if: ${{ env.DEPLOY_ENVIRONMENT != 'production' }}
        run: npm run validate:production-env
        env:
          VERCEL_ENV: preview

      - name: Build frontend preview
        if: ${{ env.DEPLOY_ENVIRONMENT != 'production' }}
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build frontend production
        if: ${{ env.DEPLOY_ENVIRONMENT == 'production' }}
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt frontend preview
        if: ${{ env.DEPLOY_ENVIRONMENT != 'production' }}
        run: |
          set -euo pipefail
          deployment_url="$(vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "FRONTEND_DEPLOYMENT_URL=$deployment_url" >> "$GITHUB_ENV"
          echo "Deployed preview to $deployment_url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt frontend production
        if: ${{ env.DEPLOY_ENVIRONMENT == 'production' }}
        run: |
          set -euo pipefail
          deployment_url="$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "FRONTEND_DEPLOYMENT_URL=$deployment_url" >> "$GITHUB_ENV"
          echo "Deployed production to $deployment_url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Post-deploy frontend smoke
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import urllib.request

          raw_url = os.environ.get("FRONTEND_DEPLOYMENT_URL", "").strip()
          if not raw_url:
              raise SystemExit("FRONTEND_DEPLOYMENT_URL was not captured from Vercel deploy.")
          url = raw_url if raw_url.startswith(("http://", "https://")) else f"https://{raw_url}"
          request = urllib.request.Request(
              url,
              headers={"Accept": "text/html", "User-Agent": "kresco-frontend-deploy-smoke/1.0"},
              method="GET",
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              status = response.getcode()
              body = response.read(4096).decode("utf-8", errors="replace")
          if status >= 400:
              raise SystemExit(f"Frontend smoke request failed with HTTP {status}.")
          if "<html" not in body.lower():
              raise SystemExit("Frontend smoke response did not look like an HTML page.")
          print(f"Frontend smoke passed for {url}")
          PY

      - name: Post-deploy production surface scan
        if: ${{ env.DEPLOY_ENVIRONMENT == 'production' }}
        run: |
          set -euo pipefail
          deployment_url="${FRONTEND_DEPLOYMENT_URL:?FRONTEND_DEPLOYMENT_URL was not captured from Vercel deploy.}"
          production_base_urls="${FRONTEND_PRODUCTION_BASE_URLS:-}"
          if [ -z "$production_base_urls" ]; then
            echo "::error::FRONTEND_PRODUCTION_BASE_URLS must include every public production alias to scan."
            exit 1
          fi
          scan_urls="$deployment_url ${production_base_urls//,/ }"
          for base_url in $scan_urls; do
            case "$base_url" in
              http://*|https://*) ;;
              *) base_url="https://$base_url" ;;
            esac
            npm run check:production-demo-surface -- --base-url "$base_url" --json
          done
        env:
          FRONTEND_PRODUCTION_BASE_URLS: ${{ vars.FRONTEND_PRODUCTION_BASE_URLS }}
