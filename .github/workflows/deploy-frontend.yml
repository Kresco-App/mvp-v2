name: Deploy Frontend to Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      confirm_production_dark_deploy:
        description: "Required for production: confirms this is dark production only and no domains/traffic are cut over"
        required: true
        default: false
        type: boolean
      enforce_production_launch_gate:
        description: "Set true only for full production cutover after provider rotation evidence is complete"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'production' && 'Production' || 'staging' }}
    env:
      REGION: europe-southwest1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve target
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::8}"
          echo "SHORT_SHA=$short_sha" >> "$GITHUB_ENV"
          case "${{ inputs.environment }}" in
            staging)
              echo "PROJECT_ID=kresco-staging" >> "$GITHUB_ENV"
              echo "FRONTEND_SERVICE=kresco-frontend-staging" >> "$GITHUB_ENV"
              echo "BACKEND_SERVICE=kresco-backend-staging" >> "$GITHUB_ENV"
              ;;
            production)
              if [ "${{ inputs.confirm_production_dark_deploy }}" != "true" ]; then
                echo "::error::Production deploys are dark-production only and require confirm_production_dark_deploy=true."
                exit 1
              fi
              echo "PROJECT_ID=kresco-prod" >> "$GITHUB_ENV"
              echo "FRONTEND_SERVICE=kresco-frontend-prod" >> "$GITHUB_ENV"
              echo "BACKEND_SERVICE=kresco-backend-prod" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Check repository hygiene
        run: python scripts/check_repo_hygiene.py

      - name: Check secret hygiene
        run: python scripts/check_secret_hygiene.py

      - name: Assert dark production boundary
        if: ${{ inputs.environment == 'production' && inputs.enforce_production_launch_gate == false }}
        run: |
          echo "Dark production deploy only: this workflow does not route domains or user traffic."
          echo "Provider rotation evidence and production launch gate remain required before cutover."

      - name: Enforce production secret rotation checklist
        if: ${{ inputs.environment == 'production' && inputs.enforce_production_launch_gate == true }}
        run: python scripts/check_secret_hygiene.py --require-rotation-checklist

      - name: Enforce production launch gate
        if: ${{ inputs.environment == 'production' && inputs.enforce_production_launch_gate == true }}
        run: python scripts/check_production_launch_gate.py

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve Cloud Run URLs and Firebase build config
        run: |
          set -euo pipefail
          backend_url="$(gcloud run services describe "$BACKEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          frontend_url="$(gcloud run services describe "$FRONTEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          runtime_json="$(mktemp)"
          gcloud secrets versions access latest --project "$PROJECT_ID" --secret kresco-runtime > "$runtime_json"
          {
            echo "BACKEND_URL=$backend_url"
            echo "FRONTEND_URL=$frontend_url"
            echo "NEXT_PUBLIC_FIREBASE_API_KEY=$(jq -r '.NEXT_PUBLIC_FIREBASE_API_KEY' "$runtime_json")"
            echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=$(jq -r '.NEXT_PUBLIC_FIREBASE_PROJECT_ID' "$runtime_json")"
            echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$(jq -r '.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN' "$runtime_json")"
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$(jq -r '.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET' "$runtime_json")"
            echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$(jq -r '.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID' "$runtime_json")"
            echo "NEXT_PUBLIC_FIREBASE_APP_ID=$(jq -r '.NEXT_PUBLIC_FIREBASE_APP_ID' "$runtime_json")"
            echo "NEXT_PUBLIC_FIRESTORE_DATABASE=$(jq -r '.NEXT_PUBLIC_FIRESTORE_DATABASE' "$runtime_json")"
          } >> "$GITHUB_ENV"
          rm -f "$runtime_json"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate production-shaped frontend env
        working-directory: frontend
        run: npm run validate:production-env
        env:
          NEXT_PUBLIC_API_BASE_URL: /api
          KRESCO_BACKEND_ORIGIN: ${{ env.BACKEND_URL }}
          NEXT_PUBLIC_REALTIME_PROVIDER: firestore
          NEXT_PUBLIC_RELEASE_SHA: ${{ env.SHORT_SHA }}

      - name: Build frontend image
        run: |
          set -euo pipefail
          image="$REGION-docker.pkg.dev/$PROJECT_ID/kresco-containers/kresco-frontend:$SHORT_SHA"
          echo "FRONTEND_IMAGE=$image" >> "$GITHUB_ENV"
          gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet
          docker build --pull \
            --build-arg NEXT_PUBLIC_API_BASE_URL=/api \
            --build-arg NEXT_PUBLIC_SITE_URL="$FRONTEND_URL" \
            --build-arg NEXT_PUBLIC_REALTIME_PROVIDER=firestore \
            --build-arg NEXT_PUBLIC_ABLY_ENABLED=true \
            --build-arg NEXT_PUBLIC_RELEASE_SHA="$SHORT_SHA" \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$NEXT_PUBLIC_FIREBASE_API_KEY" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$NEXT_PUBLIC_FIREBASE_PROJECT_ID" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="$NEXT_PUBLIC_FIREBASE_APP_ID" \
            --build-arg NEXT_PUBLIC_FIRESTORE_DATABASE="$NEXT_PUBLIC_FIRESTORE_DATABASE" \
            --build-arg KRESCO_BACKEND_ORIGIN="$BACKEND_URL" \
            -f frontend/Dockerfile \
            -t "$image" \
            frontend
          docker push "$image"

      - name: Deploy frontend service
        run: |
          set -euo pipefail
          gcloud run deploy "$FRONTEND_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$FRONTEND_IMAGE" \
            --min-instances 0 \
            --max-instances 3 \
            --quiet

      - name: Verify frontend surface
        run: |
          set -euo pipefail
          url="$(gcloud run services describe "$FRONTEND_SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')"
          python - <<'PY'
          import os
          import urllib.request

          url = os.environ["FRONTEND_URL"]
          with urllib.request.urlopen(url, timeout=30) as response:
              status = response.getcode()
              body = response.read(8192).decode("utf-8", errors="replace")
          if status >= 400 or "<html" not in body.lower():
              raise SystemExit(f"Frontend smoke failed for {url}: HTTP {status}")
          if f'data-release="{os.environ["SHORT_SHA"]}"' not in body:
              raise SystemExit("Frontend release marker mismatch.")
          print(f"Frontend smoke passed for {url}")
          PY
        env:
          FRONTEND_URL: ${{ env.FRONTEND_URL }}
