name: Backend CI

on:
  workflow_call:
  pull_request:
    paths:
      - "backend/**"
      - "scripts/**"
      - ".gitignore"
      - ".github/workflows/ci-backend.yml"
      - ".github/workflows/ci-frontend.yml"
      - ".github/workflows/deploy-backend.yml"
      - ".github/workflows/deploy-frontend.yml"
      - ".github/workflows/deploy-firebase-hosting.yml"
      - ".github/workflows/staging-provider-diagnostics.yml"
      - ".github/workflows/staging-launch-evidence.yml"
      - ".github/workflows/staging-topic-latency-evidence.yml"
      - ".github/workflows/staging-live-chat-load-evidence.yml"
      - ".github/workflows/staging-realtime-fanout-evidence.yml"
      - ".github/workflows/staging-runbook-drill-evidence.yml"
      - ".github/workflows/production-dark-evidence.yml"
      - ".github/workflows/production-public-domain-evidence.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI_POSTGRES_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kresco_ci
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kresco_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kresco_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Check repository hygiene
        working-directory: .
        run: python scripts/check_repo_hygiene.py

      - name: Check secret hygiene
        working-directory: .
        run: python scripts/check_secret_hygiene.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Alembic migration check on Postgres
        run: |
          DATABASE_URL="$CI_POSTGRES_DATABASE_URL" alembic upgrade head

      - name: Run data integrity audit on Postgres
        run: |
          DATABASE_URL="$CI_POSTGRES_DATABASE_URL" python scripts/audit_data_integrity.py
          DATABASE_URL="$CI_POSTGRES_DATABASE_URL" python scripts/audit_data_integrity.py --fixture-self-test

      - name: Run query plan audit on Postgres
        run: |
          DATABASE_URL="$CI_POSTGRES_DATABASE_URL" python scripts/audit_query_plans.py

      - name: Run N+1 access-pattern scanner
        run: |
          python find_n1.py app

      - name: Startup check
        run: |
          python -c "from app.main import create_app; app = create_app(); print(app.title)"
        env:
          ADMIN_PASSWORD: test-admin-password
          JWT_SECRET_KEY: test-secret-key-for-ci-32-bytes-minimum
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"

      - name: Run tests
        run: |
          python -m pytest --cov=app --cov=scripts --cov-report=term-missing:skip-covered --cov-report=xml -q
        env:
          KRESCO_TEST_DATABASE_URL: ${{ env.CI_POSTGRES_DATABASE_URL }}
